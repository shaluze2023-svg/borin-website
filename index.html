<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ぼりんの网站</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-primary: #f0f0f5; --bg-secondary: #ffffff; --bg-card: rgba(255, 255, 255, 0.8); --text-primary: #1a1a2e; --text-secondary: #666680; --accent: #fb7299; --border: rgba(100, 120, 200, 0.2); --shadow: rgba(0, 0, 0, 0.1); --gradient-1: #e8e8f0; --gradient-2: #d0d0e0; --gradient-3: #c0c0d8; --gradient-4: #e8e8f0; --header-bg: rgba(255, 255, 255, 0.9); --sidebar-bg: rgba(245, 245, 250, 0.95); --footer-bg: rgba(245, 245, 250, 0.9); --time-bg: rgba(230, 230, 240, 0.8);
        }
        [data-theme="dark"] {
            --bg-primary: #1a1a2e; --bg-secondary: #16213e; --bg-card: rgba(20, 25, 50, 0.6); --text-primary: #f0f0f0; --text-secondary: #a0a0c0; --accent: #fb7299; --border: rgba(100, 120, 200, 0.3); --shadow: rgba(0, 0, 0, 0.3); --gradient-1: #1a1a2e; --gradient-2: #16213e; --gradient-3: #0f3460; --gradient-4: #1a1a2e; --header-bg: rgba(10, 10, 20, 0.7); --sidebar-bg: rgba(15, 20, 40, 0.95); --footer-bg: rgba(10, 10, 20, 0.85); --time-bg: rgba(30, 40, 70, 0.5);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { min-height: 100vh; background: linear-gradient(-45deg, var(--gradient-1), var(--gradient-2), var(--gradient-3), var(--gradient-4)); background-size: 400% 400%; animation: gradientBG 15s ease infinite; color: var(--text-primary); overflow-x: hidden; display: flex; flex-direction: column; transition: all 0.3s ease; }
        body.sidebar-open { overflow: hidden; }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 30px; background: var(--header-bg); backdrop-filter: blur(10px); box-shadow: 0 4px 20px var(--shadow); position: sticky; top: 0; z-index: 100; }
        .menu-btn, .search-btn { background: none; border: none; color: var(--text-primary); font-size: 1.8rem; cursor: pointer; padding: 10px; border-radius: 50%; transition: all 0.3s ease; }
        .menu-btn:hover, .search-btn:hover { background: rgba(128, 128, 128, 0.2); transform: scale(1.1); }
        .title { font-size: 2.2rem; font-weight: 700; letter-spacing: 2px; background: linear-gradient(to right, #ff7e5f, #feb47b, #86a8e7, #91eae4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .sidebar { position: fixed; top: 0; left: -350px; width: 350px; height: 100vh; background: var(--sidebar-bg); backdrop-filter: blur(10px); box-shadow: 5px 0 30px var(--shadow); z-index: 1000; transition: left 0.4s ease; display: flex; flex-direction: column; overflow-y: auto; padding: 20px; }
        .sidebar.open { left: 0; }
        .sidebar-header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; border-bottom: 1px solid var(--border); }
        .close-btn { background: none; border: none; color: var(--text-primary); font-size: 2rem; cursor: pointer; transition: all 0.3s ease; }
        .close-btn:hover { color: #ff7e5f; transform: rotate(90deg); }
        .sidebar-title { font-size: 1.8rem; background: linear-gradient(to right, #86a8e7, #91eae4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .sidebar-menu { padding: 30px 0; }
        .menu-item { padding: 15px 20px; margin: 10px 0; border-radius: 10px; display: flex; align-items: center; transition: all 0.3s ease; cursor: pointer; font-size: 1.2rem; background: var(--bg-card); border: 1px solid var(--border); }
        .menu-item:hover { background: rgba(251, 114, 153, 0.2); transform: translateX(10px); }
        .menu-item i { margin-right: 15px; font-size: 1.5rem; width: 30px; text-align: center; }
        .bilibili-icon { color: #fb7299; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(5px); z-index: 999; opacity: 0; visibility: hidden; transition: all 0.3s ease; }
        .overlay.active { opacity: 1; visibility: visible; }
        main { flex: 1; padding: 40px 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .welcome-text { font-size: 3rem; margin-bottom: 15px; color: #feb47b; animation: fadeInUp 1s ease; }
        .sub-text { font-size: 1.5rem; color: var(--text-secondary); margin-bottom: 40px; animation: fadeInUp 1s ease 0.2s both; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .info-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; max-width: 900px; width: 100%; animation: fadeInUp 1s ease 0.4s both; }
        .info-card { background: var(--bg-card); border-radius: 20px; padding: 30px; border: 1px solid var(--border); transition: all 0.3s ease; cursor: pointer; }
        .info-card:hover { transform: translateY(-10px); box-shadow: 0 15px 40px var(--shadow); border-color: #fb7299; }
        .info-card i { font-size: 3rem; margin-bottom: 15px; display: block; }
        .info-card h3 { font-size: 1.5rem; margin-bottom: 10px; }
        .info-card p { color: var(--text-secondary); line-height: 1.6; }
        .card-bilibili i { color: #fb7299; }
        .card-settings i { color: #86a8e7; }
        .card-about i { color: #feb47b; }
        .card-post i { color: #91eae4; }
        footer { display: flex; flex-direction: column; align-items: center; padding: 25px; background: var(--footer-bg); border-top: 1px solid var(--border); }
        .time-display { display: flex; align-items: center; font-size: 1.6rem; color: var(--text-primary); background: var(--time-bg); padding: 15px 30px; border-radius: 15px; }
        .time-label { color: #86a8e7; margin-right: 10px; }
        .time-value { color: #feb47b; }
        .copyright { margin-top: 20px; color: var(--text-secondary); }
        .time-icon { margin-right: 15px; font-size: 1.8rem; color: #ff7e5f; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        @media (max-width: 768px) { .welcome-text { font-size: 2.5rem; } .info-container { grid-template-columns: 1fr; } }
        @media (max-width: 480px) { header { padding: 15px 20px; } .welcome-text { font-size: 2rem; } .title { font-size: 1.5rem; } .menu-btn, .search-btn { font-size: 1.5rem; } .sub-text { font-size: 1.3rem; } .time-display { font-size: 1.2rem; padding: 12px 20px; flex-direction: column; } .time-icon { margin-bottom: 10px; } }
    </style>
    <script src="protect.js"></script>
</head>
<body>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2 class="sidebar-title">ぼりんの菜单</h2>
            <button class="close-btn" id="closeSidebar"><i class="fas fa-times"></i></button>
        </div>
        <div class="sidebar-menu">
            <div class="menu-item" onclick="navigateTo('bilibili.html')"><i class="fab fa-bilibili bilibili-icon"></i><span>B站热门视频</span></div>
            <div class="menu-item" onclick="navigateTo('post.html')"><i class="fas fa-newspaper"></i><span>帖子动态</span></div>
            <div class="menu-item" onclick="navigateTo('settings.html')"><i class="fas fa-cog"></i><span>设置</span></div>
            <div class="menu-item" onclick="navigateTo('about.html')"><i class="fas fa-info-circle"></i><span>关于我们</span></div>
        </div>
        <div class="sidebar-footer" style="margin-top: auto; padding: 20px 0; text-align: center;"><p>更多功能开发中...</p></div>
    </div>
    <div class="overlay" id="overlay"></div>
    
    <header>
        <button class="menu-btn" id="menuToggle"><i class="fas fa-bars"></i></button>
        <h1 class="title">ぼりんの网站</h1>
        <button class="search-btn" id="searchToggle"><i class="fas fa-search"></i></button>
    </header>
    
    <main>
        <h2 class="welcome-text">欢迎来到ぼりんの网站！</h2>
        <p class="sub-text">ぼりん•ボリンの勾石网站</p>
        <div class="info-container">
            <div class="info-card card-bilibili" onclick="location.href='bilibili.html'">
                <i class="fab fa-bilibili"></i>
                <h3>B站热门视频</h3>
                <p>查看B站热门视频排行</p>
            </div>
            <div class="info-card card-post" onclick="location.href='post.html'">
                <i class="fas fa-newspaper"></i>
                <h3>帖子动态</h3>
                <p>浏览和发布帖子</p>
            </div>
            <div class="info-card card-settings" onclick="location.href='settings.html'">
                <i class="fas fa-cog"></i>
                <h3>设置</h3>
                <p>自定义网站主题和偏好</p>
            </div>
            <div class="info-card card-about" onclick="location.href='about.html'">
                <i class="fas fa-info-circle"></i>
                <h3>关于我们</h3>
                <p>了解更多关于这个网站</p>
            </div>
        </div>
    </main>
    
    <footer>
        <div class="time-display"><i class="fas fa-clock time-icon"></i><span class="time-label">北京时间：</span><span class="time-value" id="beijing-time">00:00:00</span></div>
        <div class="copyright">© 2026 ぼりんの网站 | ぼりん所有权</div>
    </footer>
    
    <script>
        // 地址栏规范化：根路径重定向到index.html
        if (window.location.pathname === "/" || window.location.pathname === "") {
            window.history.replaceState({}, "", "/index.html");
        }
        function getBeijingHour() { const now = new Date(); const utc = now.getTime() + (now.getTimezoneOffset() * 60000); return new Date(utc + (3600000 * 8)).getHours(); }
        function initTheme() { const saved = getCookie('theme'); if (saved) applyTheme(saved); else applyTheme(getBeijingHour() >= 6 && getBeijingHour() < 18 ? 'light' : 'dark'); }
        function applyTheme(theme) { document.documentElement.setAttribute('data-theme', theme); }
        function setCookie(name, value, days) { document.cookie = name + '=' + encodeURIComponent(value) + '; expires=' + new Date(Date.now() + days * 864e5).toUTCString() + '; path=/'; }
        function getCookie(name) { const c = document.cookie.split('; ').find(row => row.startsWith(name + '=')); return c ? decodeURIComponent(c.split('=')[1]) : null; }
        initTheme();
        
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        document.getElementById('menuToggle').addEventListener('click', () => { sidebar.classList.add('open'); overlay.classList.add('active'); document.body.classList.add('sidebar-open'); });
        function closeSidebarMenu() { sidebar.classList.remove('open'); overlay.classList.remove('active'); document.body.classList.remove('sidebar-open'); }
        document.getElementById('closeSidebar').addEventListener('click', closeSidebarMenu);
        overlay.addEventListener('click', closeSidebarMenu);
        function navigateTo(page) { closeSidebarMenu(); setTimeout(() => { window.location.href = page; }, 300); }
        
        function updateTimeDisplay() {
            const now = new Date();
            const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
            const bj = new Date(utc + (3600000 * 8));
            document.getElementById('beijing-time').textContent = bj.getHours().toString().padStart(2, '0') + ':' + bj.getMinutes().toString().padStart(2, '0') + ':' + bj.getSeconds().toString().padStart(2, '0');
        }
        updateTimeDisplay();
        setInterval(updateTimeDisplay, 1000);
        
        document.getElementById('searchToggle').addEventListener('click', function() { window.location.href = 'search.html'; });
    </script>
</body>
</html>
