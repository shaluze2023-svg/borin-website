<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>设置 - ぼりんの网站</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-primary: #f0f0f5;
            --bg-secondary: #ffffff;
            --bg-card: rgba(255, 255, 255, 0.8);
            --text-primary: #1a1a2e;
            --text-secondary: #666680;
            --accent: #fb7299;
            --border: rgba(100, 120, 200, 0.2);
            --shadow: rgba(0, 0, 0, 0.1);
            --gradient-1: #e8e8f0;
            --gradient-2: #d0d0e0;
            --gradient-3: #c0c0d8;
            --gradient-4: #e8e8f0;
            --header-bg: rgba(255, 255, 255, 0.9);
            --sidebar-bg: rgba(245, 245, 250, 0.95);
            --footer-bg: rgba(245, 245, 250, 0.9);
            --time-bg: rgba(230, 230, 240, 0.8);
            --input-bg: rgba(230, 230, 240, 0.6);
        }
        [data-theme="dark"] {
            --bg-primary: #1a1a2e;
            --bg-secondary: #16213e;
            --bg-card: rgba(20, 25, 50, 0.6);
            --text-primary: #f0f0f0;
            --text-secondary: #a0a0c0;
            --accent: #fb7299;
            --border: rgba(100, 120, 200, 0.3);
            --shadow: rgba(0, 0, 0, 0.3);
            --gradient-1: #1a1a2e;
            --gradient-2: #16213e;
            --gradient-3: #0f3460;
            --gradient-4: #1a1a2e;
            --header-bg: rgba(10, 10, 20, 0.7);
            --sidebar-bg: rgba(15, 20, 40, 0.95);
            --footer-bg: rgba(10, 10, 20, 0.85);
            --time-bg: rgba(30, 40, 70, 0.5);
            --input-bg: rgba(30, 40, 70, 0.5);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { min-height: 100vh; background: linear-gradient(-45deg, var(--gradient-1), var(--gradient-2), var(--gradient-3), var(--gradient-4)); background-size: 400% 400%; animation: gradientBG 15s ease infinite; color: var(--text-primary); overflow-x: hidden; display: flex; flex-direction: column; transition: all 0.3s ease; }
        body.sidebar-open { overflow: hidden; }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 30px; background: var(--header-bg); backdrop-filter: blur(10px); box-shadow: 0 4px 20px var(--shadow); position: sticky; top: 0; z-index: 100; }
        .menu-btn, .search-btn { background: none; border: none; color: var(--text-primary); font-size: 1.8rem; cursor: pointer; padding: 10px; border-radius: 50%; transition: all 0.3s ease; display: flex; align-items: center; justify-content: center; z-index: 101; }
        .menu-btn:hover, .search-btn:hover { background: rgba(128, 128, 128, 0.2); transform: scale(1.1); }
        .title { font-size: 2.2rem; font-weight: 700; letter-spacing: 2px; background: linear-gradient(to right, #ff7e5f, #feb47b, #86a8e7, #91eae4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .sidebar { position: fixed; top: 0; left: -350px; width: 350px; height: 100vh; background: var(--sidebar-bg); backdrop-filter: blur(10px); box-shadow: 5px 0 30px var(--shadow); z-index: 1000; transition: left 0.4s ease; display: flex; flex-direction: column; overflow-y: auto; padding: 20px; }
        .sidebar.open { left: 0; }
        .sidebar-header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; border-bottom: 1px solid var(--border); }
        .close-btn { background: none; border: none; color: var(--text-primary); font-size: 2rem; cursor: pointer; transition: all 0.3s ease; }
        .close-btn:hover { color: #ff7e5f; transform: rotate(90deg); }
        .sidebar-title { font-size: 1.8rem; background: linear-gradient(to right, #86a8e7, #91eae4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .sidebar-menu { padding: 30px 0; }
        .menu-item { padding: 15px 20px; margin: 10px 0; border-radius: 10px; display: flex; align-items: center; transition: all 0.3s ease; cursor: pointer; font-size: 1.2rem; background: var(--bg-card); border: 1px solid var(--border); }
        .menu-item:hover { background: rgba(251, 114, 153, 0.2); transform: translateX(10px); }
        .menu-item i { margin-right: 15px; font-size: 1.5rem; width: 30px; text-align: center; }
        .bilibili-icon { color: #fb7299; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(5px); z-index: 999; opacity: 0; visibility: hidden; transition: all 0.3s ease; }
        .overlay.active { opacity: 1; visibility: visible; }
        main { flex: 1; padding: 40px 20px; display: flex; flex-direction: column; align-items: center; }
        .settings-container { max-width: 600px; width: 100%; background: var(--bg-card); border-radius: 20px; padding: 40px; border: 1px solid var(--border); box-shadow: 0 10px 30px var(--shadow); text-align: center; }
        .settings-title { font-size: 2.5rem; margin-bottom: 30px; color: #feb47b; }
        .back-btn { display: inline-flex; align-items: center; background: var(--bg-card); color: var(--text-primary); padding: 10px 20px; border-radius: 30px; text-decoration: none; transition: all 0.3s ease; margin-bottom: 30px; border: 1px solid var(--border); }
        .back-btn:hover { background: rgba(251, 114, 153, 0.2); transform: translateX(-5px); }
        .back-btn i { margin-right: 8px; }
        .setting-item { margin: 25px 0; text-align: left; }
        .setting-label { display: block; font-size: 1.1rem; color: #86a8e7; margin-bottom: 10px; }
        .setting-row { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: var(--input-bg); border-radius: 10px; margin-bottom: 15px; }
        .setting-name { font-size: 1rem; }
        .setting-desc { font-size: 0.85rem; color: var(--text-secondary); margin-top: 5px; }
        .toggle-switch { position: relative; width: 50px; height: 26px; }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .toggle-slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: rgba(100, 120, 200, 0.3); transition: 0.4s; border-radius: 26px; }
        .toggle-slider:before { position: absolute; content: ""; height: 20px; width: 20px; left: 3px; bottom: 3px; background-color: white; transition: 0.4s; border-radius: 50%; }
        input:checked + .toggle-slider { background-color: #fb7299; }
        input:checked + .toggle-slider:before { transform: translateX(24px); }
        .theme-options { display: flex; gap: 15px; flex-wrap: wrap; }
        .theme-option { flex: 1; min-width: 120px; padding: 15px; background: var(--input-bg); border: 2px solid var(--border); border-radius: 12px; cursor: pointer; transition: all 0.3s ease; text-align: center; }
        .theme-option:hover { border-color: #86a8e7; }
        .theme-option.active { border-color: #fb7299; background: rgba(251, 114, 153, 0.1); }
        .theme-option i { font-size: 2rem; margin-bottom: 8px; display: block; }
        .theme-option span { font-size: 0.9rem; }
        .language-select { width: 100%; padding: 15px; background: var(--input-bg); border: 1px solid var(--border); border-radius: 10px; color: var(--text-primary); font-size: 1.1rem; text-align: center; cursor: pointer; }
        .language-select:focus { outline: none; border-color: #86a8e7; }
        .language-select option { background: var(--bg-secondary); color: var(--text-primary); }
        .save-btn { background: #fb7299; color: white; border: none; padding: 12px 30px; border-radius: 30px; font-size: 1.1rem; cursor: pointer; transition: all 0.3s ease; margin-top: 20px; }
        .save-btn:hover { background: #e55a80; transform: translateY(-3px); box-shadow: 0 5px 15px rgba(251, 114, 153, 0.4); }
        .save-btn i { margin-right: 8px; }
        .language-info { margin-top: 30px; padding: 20px; background: var(--input-bg); border-radius: 15px; font-size: 1rem; color: var(--text-secondary); }
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--accent); color: white; padding: 15px 30px; border-radius: 10px; font-size: 1rem; z-index: 2000; transition: transform 0.3s ease; box-shadow: 0 5px 15px var(--shadow); }
        .toast.show { transform: translateX(-50%) translateY(0); }
        footer { display: flex; flex-direction: column; align-items: center; text-align: center; padding: 25px; background: var(--footer-bg); color: var(--text-secondary); border-top: 1px solid var(--border); }
        .time-display { display: flex; justify-content: center; align-items: center; margin-top: 10px; font-size: 1.6rem; color: var(--text-primary); background: var(--time-bg); padding: 15px 30px; border-radius: 15px; font-weight: 600; letter-spacing: 1px; box-shadow: 0 5px 15px var(--shadow); }
        .time-label { color: #86a8e7; margin-right: 10px; }
        .time-value { color: #feb47b; min-width: 170px; text-align: center; }
        .copyright { margin-top: 20px; font-size: 1rem; color: var(--text-secondary); }
        .time-icon { margin-right: 15px; font-size: 1.8rem; color: #ff7e5f; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        @media (max-width: 768px) { .settings-title { font-size: 2rem; } .settings-container { padding: 30px; } .theme-options { flex-direction: column; } }
        @media (max-width: 480px) { header { padding: 15px 20px; } .title { font-size: 1.5rem; } .menu-btn, .search-btn { font-size: 1.5rem; } .settings-title { font-size: 1.8rem; } .settings-container { padding: 20px; } }
    </style>
<script src="protect.js"></script></head>
<body>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2 class="sidebar-title">ぼりんの菜单</h2>
            <button class="close-btn" id="closeSidebar"><i class="fas fa-times"></i></button>
        </div>
        <div class="sidebar-menu">
            <div class="menu-item" onclick="navigateTo('bilibili.html')"><i class="fab fa-bilibili bilibili-icon"></i><span>B站热门视频</span></div>
            <div class="menu-item" onclick="navigateTo('post.html')"><i class="fas fa-newspaper"></i><span>帖子动态</span></div>
            <div class="menu-item" onclick="navigateTo('settings.html')"><i class="fas fa-cog"></i><span>设置</span></div>
            <div class="menu-item" onclick="navigateTo('about.html')"><i class="fas fa-info-circle"></i><span>关于我们</span></div>
        </div>
        <div class="sidebar-footer" style="margin-top: auto; padding: 20px 0; text-align: center;"><p>更多功能开发中...</p></div>
    </div>
    <div class="overlay" id="overlay"></div>
    <div class="toast" id="toast">设置已保存</div>
        <h1 class="title">设置</h1>
    </header>
    <main>
        <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> 返回首页</a>
        <div class="settings-container">
            <h2 class="settings-title">系统设置</h2>
            
            <div class="setting-item">
                <label class="setting-label">外观主题</label>
                <div class="theme-options">
                    <div class="theme-option" data-theme="light" onclick="setThemeOption('light')">
                        <i class="fas fa-sun" style="color: #ffa500;"></i>
                        <span>浅色模式</span>
                    </div>
                    <div class="theme-option" data-theme="dark" onclick="setThemeOption('dark')">
                        <i class="fas fa-moon" style="color: #6666cc;"></i>
                        <span>深色模式</span>
                    </div>
                    <div class="theme-option" data-theme="auto" onclick="setThemeOption('auto')">
                        <i class="fas fa-clock" style="color: #fb7299;"></i>
                        <span>自动切换</span>
                    </div>
                </div>
                <p class="setting-desc" style="margin-top: 10px;">自动模式：北京时间 6:00-18:00 使用浅色，其他时间深色</p>
            </div>
            
            <div class="setting-item">
                <label class="setting-label">语言设置</label>
                <select class="language-select" id="language">
                    <option value="zh">简体中文</option>
                    <option value="zh-tw">繁體中文</option>
                    <option value="en">English</option>
                    <option value="ja">日本語</option>
                </select>
            </div>
            
            <div class="setting-item">
                <label class="setting-label">显示设置</label>
                <div class="setting-row">
                    <div>
                        <div class="setting-name">显示视频封面</div>
                        <div class="setting-desc">在视频列表中显示封面图片</div>
                    </div>
                    <label class="toggle-switch">
                        <input type="checkbox" id="showCovers" checked>
                        <span class="toggle-slider"></span>
                    </label>
                </div>
                <div class="setting-row">
                    <div>
                        <div class="setting-name">动画效果</div>
                        <div class="setting-desc">启用页面过渡动画</div>
                    </div>
                    <label class="toggle-switch">
                        <input type="checkbox" id="enableAnimations" checked>
                        <span class="toggle-slider"></span>
                    </label>
                </div>
            </div>
            
            <div class="setting-item">
                <label class="setting-label">数据管理</label>
                <div class="setting-row" style="cursor: pointer;" onclick="clearCache()">
                    <div>
                        <div class="setting-name">清除缓存</div>
                        <div class="setting-desc">清除本地存储的设置和数据</div>
                    </div>
                    <i class="fas fa-trash" style="color: #fb7299;"></i>
                </div>
            </div>
            
            <button class="save-btn" onclick="saveSettings()"><i class="fas fa-save"></i> 保存设置</button>
            
            <div class="language-info">
                <p>设置将保存在浏览器Cookies中</p>
                <p>清除浏览器数据会重置所有设置</p>
            </div>
        </div>
    </main>
    <footer>
        <div class="time-display"><i class="fas fa-clock time-icon"></i><span class="time-label">北京时间：</span><span class="time-value" id="beijing-time">00:00:00</span></div>
        <div class="copyright">© 2026 ぼりんの网站 | 设置页面</div>
    </footer>
    <script>
        // 主题管理
        function getBeijingHour() { const now = new Date(); const utc = now.getTime() + (now.getTimezoneOffset() * 60000); return new Date(utc + (3600000 * 8)).getHours(); }
        function initTheme() {
            const saved = getCookie('theme');
            if (saved === 'auto' || !saved) {
                applyTheme(getBeijingHour() >= 6 && getBeijingHour() < 18 ? 'light' : 'dark');
            } else {
                applyTheme(saved);
            }
            updateThemeOptions(saved || 'auto');
        }
        function applyTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            document.querySelector('#themeToggle i').className = theme === 'dark' ? 'fas fa-moon' : 'fas fa-sun';
        }
        function setTheme(theme) {
            const currentSetting = getCookie('themeSetting') || 'auto';
            if (currentSetting === 'auto') {
                applyTheme(getBeijingHour() >= 6 && getBeijingHour() < 18 ? 'light' : 'dark');
            } else {
                applyTheme(currentSetting);
            }
        }
        function setThemeOption(theme) {
            document.querySelectorAll('.theme-option').forEach(opt => opt.classList.remove('active'));
            document.querySelector('.theme-option[data-theme="' + theme + '"]').classList.add('active');
            if (theme === 'auto') {
                applyTheme(getBeijingHour() >= 6 && getBeijingHour() < 18 ? 'light' : 'dark');
            } else {
                applyTheme(theme);
            }
        }
        function updateThemeOptions(current) {
            document.querySelectorAll('.theme-option').forEach(opt => opt.classList.remove('active'));
            document.querySelector('.theme-option[data-theme="' + (current || 'auto') + '"]').classList.add('active');
        }
        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme');
            applyTheme(current === 'dark' ? 'light' : 'dark');
            document.querySelectorAll('.theme-option').forEach(opt => opt.classList.remove('active'));
        }
        function setCookie(name, value, days) { document.cookie = name + '=' + encodeURIComponent(value) + '; expires=' + new Date(Date.now() + days * 864e5).toUTCString() + '; path=/'; }
        function getCookie(name) { const c = document.cookie.split('; ').find(row => row.startsWith(name + '=')); return c ? decodeURIComponent(c.split('=')[1]) : null; }
        initTheme();
        
        const sidebar = document.getElementById('sidebar');
        const menuToggle = document.getElementById('menuToggle');
        const closeSidebarBtn = document.getElementById('closeSidebar');
        const overlay = document.getElementById('overlay');
        const toast = document.getElementById('toast');
        
        menuToggle.addEventListener('click', function() { sidebar.classList.add('open'); overlay.classList.add('active'); document.body.classList.add('sidebar-open'); });
        function closeSidebarMenu() { sidebar.classList.remove('open'); overlay.classList.remove('active'); document.body.classList.remove('sidebar-open'); }
        closeSidebarBtn.addEventListener('click', closeSidebarMenu);
        overlay.addEventListener('click', closeSidebarMenu);
        function navigateTo(page) { closeSidebarMenu(); setTimeout(() => { window.location.href = page; }, 300); }
        
        function loadSettings() {
            const themeSetting = getCookie('themeSetting') || 'auto';
            updateThemeOptions(themeSetting);
            const lang = getCookie('language');
            if (lang) document.getElementById('language').value = lang;
            const showCovers = getCookie('showCovers');
            if (showCovers !== null) document.getElementById('showCovers').checked = showCovers === 'true';
            const animations = getCookie('enableAnimations');
            if (animations !== null) document.getElementById('enableAnimations').checked = animations === 'true';
        }
        
        function saveSettings() {
            const themeSetting = document.querySelector('.theme-option.active')?.dataset.theme || 'auto';
            setCookie('themeSetting', themeSetting, 365);
            if (themeSetting !== 'auto') setCookie('theme', themeSetting, 365);
            else setCookie('theme', '', -1);
            setCookie('language', document.getElementById('language').value, 365);
            setCookie('showCovers', document.getElementById('showCovers').checked, 365);
            setCookie('enableAnimations', document.getElementById('enableAnimations').checked, 365);
            showToast('设置已保存！');
        }
        
        function clearCache() {
            document.cookie.split(';').forEach(c => { document.cookie = c.replace(/^ +/, '').replace(/=.*/, '=;expires=' + new Date().toUTCString() + ';path=/'); });
            showToast('缓存已清除！');
            location.reload();
        }
        
        function showToast(message) {
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => { toast.classList.remove('show'); }, 2000);
        }
        
        function updateTimeDisplay() { const now = new Date(); const utc = now.getTime() + (now.getTimezoneOffset() * 60000); const bj = new Date(utc + (3600000 * 8)); document.getElementById('beijing-time').textContent = bj.getHours().toString().padStart(2, '0') + ':' + bj.getMinutes().toString().padStart(2, '0') + ':' + bj.getSeconds().toString().padStart(2, '0'); }
        updateTimeDisplay(); setInterval(updateTimeDisplay, 1000);
        document.getElementById('searchToggle').addEventListener('click', function() { window.location.href = 'search.html'; });
        
        loadSettings();
    </script>
</body>
</html>
