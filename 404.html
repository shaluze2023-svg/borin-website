<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - 页面未找到 | ぼりんの网站</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --text-primary: #1a1a2e; --text-secondary: #666680; --accent: #fb7299; }
        [data-theme="dark"] { --text-primary: #f0f0f0; --text-secondary: #a0a0c0; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(-45deg, #e8e8f0, #d0d0e0, #c0c0d8, #e8e8f0); background-size: 400% 400%; animation: gradientBG 15s ease infinite; }
        [data-theme="dark"] body { background: linear-gradient(-45deg, #1a1a2e, #16213e, #0f3460, #1a1a2e); background-size: 400% 400%; }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .container { text-align: center; padding: 40px; }
        .error-code { font-size: 12rem; font-weight: 900; background: linear-gradient(135deg, #fb7299, #ff7e5f, #feb47b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1; animation: bounce 2s ease infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
        .error-title { font-size: 2rem; color: var(--text-primary); margin: 20px 0; }
        .error-message { font-size: 1.2rem; color: var(--text-secondary); margin-bottom: 30px; }
        .home-btn { display: inline-flex; align-items: center; gap: 10px; padding: 15px 30px; background: linear-gradient(135deg, #fb7299, #ff7e5f); color: white; text-decoration: none; border-radius: 50px; font-size: 1.1rem; transition: all 0.3s ease; }
        .home-btn:hover { transform: scale(1.05); box-shadow: 0 10px 30px rgba(251, 114, 153, 0.4); }
        @media (max-width: 480px) { .error-code { font-size: 6rem; } .error-title { font-size: 1.5rem; } .error-message { font-size: 1rem; } }
    </style>
    <script src="protect.js"></script>
</head>
<body>
    <div class="container">
        <div class="error-code">404</div>
        <h1 class="error-title">Not Found This Page</h1>
        <p class="error-message">抱歉，您访问的页面不存在或已被删除</p>
        <a href="/" class="home-btn"><i class="fas fa-home"></i> 返回首页</a>
    </div>
</body>
</html>
