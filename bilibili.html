<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B站热门视频 - ぼりんの网站</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-primary: #f0f0f5;
            --bg-secondary: #ffffff;
            --bg-card: #ffffff;
            --text-primary: #1a1a2e;
            --text-secondary: #666680;
            --accent: #fb7299;
            --accent-hover: #e55a80;
            --border: rgba(100, 120, 200, 0.2);
            --shadow: rgba(0, 0, 0, 0.1);
            --gradient-1: #e8e8f0;
            --gradient-2: #d0d0e0;
            --gradient-3: #c0c0d8;
            --gradient-4: #e8e8f0;
            --header-bg: rgba(255, 255, 255, 0.9);
            --sidebar-bg: rgba(245, 245, 250, 0.95);
            --card-bg: rgba(255, 255, 255, 0.8);
            --footer-bg: rgba(245, 245, 250, 0.9);
            --time-bg: rgba(230, 230, 240, 0.8);
        }
        [data-theme="dark"] {
            --bg-primary: #1a1a2e;
            --bg-secondary: #16213e;
            --bg-card: rgba(20, 25, 50, 0.6);
            --text-primary: #f0f0f0;
            --text-secondary: #a0a0c0;
            --accent: #fb7299;
            --accent-hover: #e55a80;
            --border: rgba(100, 120, 200, 0.3);
            --shadow: rgba(0, 0, 0, 0.3);
            --gradient-1: #1a1a2e;
            --gradient-2: #16213e;
            --gradient-3: #0f3460;
            --gradient-4: #1a1a2e;
            --header-bg: rgba(10, 10, 20, 0.7);
            --sidebar-bg: rgba(15, 20, 40, 0.95);
            --card-bg: rgba(20, 25, 50, 0.6);
            --footer-bg: rgba(10, 10, 20, 0.85);
            --time-bg: rgba(30, 40, 70, 0.5);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { min-height: 100vh; background: linear-gradient(-45deg, var(--gradient-1), var(--gradient-2), var(--gradient-3), var(--gradient-4)); background-size: 400% 400%; animation: gradientBG 15s ease infinite; color: var(--text-primary); overflow-x: hidden; display: flex; flex-direction: column; transition: all 0.3s ease; }
        body.sidebar-open { overflow: hidden; }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 30px; background: var(--header-bg); backdrop-filter: blur(10px); box-shadow: 0 4px 20px var(--shadow); position: sticky; top: 0; z-index: 100; }
        .menu-btn, .search-btn { background: none; border: none; color: var(--text-primary); font-size: 1.8rem; cursor: pointer; padding: 10px; border-radius: 50%; transition: all 0.3s ease; display: flex; align-items: center; justify-content: center; z-index: 101; }
        .menu-btn:hover, .search-btn:hover { background: rgba(128, 128, 128, 0.2); transform: scale(1.1); }
        .title { font-size: 2.2rem; font-weight: 700; letter-spacing: 2px; background: linear-gradient(to right, #ff7e5f, #feb47b, #86a8e7, #91eae4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .sidebar { position: fixed; top: 0; left: -350px; width: 350px; height: 100vh; background: var(--sidebar-bg); backdrop-filter: blur(10px); box-shadow: 5px 0 30px var(--shadow); z-index: 1000; transition: left 0.4s ease; display: flex; flex-direction: column; overflow-y: auto; padding: 20px; }
        .sidebar.open { left: 0; }
        .sidebar-header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; border-bottom: 1px solid var(--border); }
        .close-btn { background: none; border: none; color: var(--text-primary); font-size: 2rem; cursor: pointer; transition: all 0.3s ease; }
        .close-btn:hover { color: #ff7e5f; transform: rotate(90deg); }
        .sidebar-title { font-size: 1.8rem; background: linear-gradient(to right, #86a8e7, #91eae4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .sidebar-menu { padding: 30px 0; }
        .menu-item { padding: 15px 20px; margin: 10px 0; border-radius: 10px; display: flex; align-items: center; transition: all 0.3s ease; cursor: pointer; font-size: 1.2rem; background: var(--card-bg); border: 1px solid var(--border); }
        .menu-item:hover { background: rgba(251, 114, 153, 0.2); transform: translateX(10px); }
        .menu-item i { margin-right: 15px; font-size: 1.5rem; width: 30px; text-align: center; }
        .bilibili-icon { color: #fb7299; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(5px); z-index: 999; opacity: 0; visibility: hidden; transition: all 0.3s ease; }
        .overlay.active { opacity: 1; visibility: visible; }
        main { flex: 1; padding: 30px 20px; max-width: 1200px; margin: 0 auto; }
        .page-title { font-size: 2.5rem; text-align: center; margin: 20px 0 40px; background: linear-gradient(to right, #fb7299, #ffafc9); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .videos-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; margin-top: 20px; }
        .video-card { background: var(--card-bg); border-radius: 15px; overflow: hidden; transition: all 0.3s ease; border: 1px solid var(--border); box-shadow: 0 10px 25px var(--shadow); cursor: pointer; }
        .video-card:hover { transform: translateY(-8px); box-shadow: 0 15px 35px var(--shadow); border-color: var(--accent); }
        .video-cover { position: relative; width: 100%; height: 180px; overflow: hidden; background: linear-gradient(45deg, var(--gradient-1), var(--gradient-2)); display: flex; align-items: center; justify-content: center; }
        .video-cover img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease; }
        .video-card:hover .video-cover img { transform: scale(1.05); }
        .cover-placeholder { position: absolute; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; color: var(--text-secondary); font-size: 3rem; z-index: 1; }
        .video-duration { position: absolute; bottom: 10px; right: 10px; background: rgba(0, 0, 0, 0.7); color: #fff; padding: 3px 8px; border-radius: 4px; font-size: 0.9rem; z-index: 2; }
        .video-info { padding: 15px; }
        .video-title { font-size: 1.1rem; margin-bottom: 10px; line-height: 1.4; height: 3.2em; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; color: var(--text-primary); }
        .video-stats { display: flex; justify-content: space-between; color: var(--text-secondary); font-size: 0.9rem; margin-top: 10px; }
        .up-name { display: flex; align-items: center; color: #86a8e7; }
        .up-name i { margin-right: 5px; font-size: 0.9rem; }
        .back-btn { display: inline-flex; align-items: center; background: var(--card-bg); color: var(--text-primary); padding: 10px 20px; border-radius: 30px; text-decoration: none; transition: all 0.3s ease; margin-bottom: 30px; border: 1px solid var(--border); }
        .back-btn:hover { background: rgba(251, 114, 153, 0.2); transform: translateX(-5px); }
        .back-btn i { margin-right: 8px; }
        .loading { text-align: center; padding: 50px; font-size: 1.5rem; color: var(--text-secondary); }
        .loading i { font-size: 2rem; margin-bottom: 20px; display: block; animation: spin 1.5s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .video-play-btn { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 60px; height: 60px; background: rgba(251, 114, 153, 0.8); border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 3; opacity: 0; transition: opacity 0.3s ease; }
        .video-card:hover .video-play-btn { opacity: 1; }
        .video-play-btn i { color: white; font-size: 1.8rem; margin-left: 5px; }
        .notification { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--accent); color: white; padding: 15px 25px; border-radius: 10px; z-index: 2000; display: flex; align-items: center; box-shadow: 0 5px 15px var(--shadow); opacity: 0; transition: opacity 0.3s ease; }
        .notification.show { opacity: 1; }
        .notification i { margin-right: 10px; font-size: 1.5rem; }
        footer { display: flex; flex-direction: column; align-items: center; text-align: center; padding: 25px; background: var(--footer-bg); color: var(--text-secondary); border-top: 1px solid var(--border); }
        .time-display { display: flex; justify-content: center; align-items: center; margin-top: 10px; font-size: 1.6rem; color: var(--text-primary); background: var(--time-bg); padding: 15px 30px; border-radius: 15px; font-weight: 600; letter-spacing: 1px; box-shadow: 0 5px 15px var(--shadow); }
        .time-label { color: #86a8e7; margin-right: 10px; }
        .time-value { color: #feb47b; min-width: 170px; text-align: center; }
        .copyright { margin-top: 20px; font-size: 1rem; color: var(--text-secondary); }
        .time-icon { margin-right: 15px; font-size: 1.8rem; color: #ff7e5f; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        .refresh-btn { background: var(--accent); color: white; border: none; padding: 12px 25px; border-radius: 25px; font-size: 1rem; cursor: pointer; transition: all 0.3s ease; margin-top: 20px; }
        .refresh-btn:hover { background: var(--accent-hover); transform: translateY(-2px); }
        @media (max-width: 768px) { .title { font-size: 1.8rem; } .sidebar { width: 280px; left: -280px; } .videos-container { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); } .page-title { font-size: 2rem; } }
        @media (max-width: 480px) { header { padding: 15px 20px; } .title { font-size: 1.5rem; } .menu-btn, .search-btn { font-size: 1.5rem; } .sidebar { width: 100%; left: -100%; } .videos-container { grid-template-columns: 1fr; } .page-title { font-size: 1.8rem; } .video-cover { height: 150px; } .video-play-btn { width: 50px; height: 50px; } }
    </style>
<script src="protect.js"></script></head>
<body>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2 class="sidebar-title">ぼりんの菜单</h2>
            <button class="close-btn" id="closeSidebar"><i class="fas fa-times"></i></button>
        </div>
        <div class="sidebar-menu">
            <div class="menu-item" onclick="navigateTo('bilibili.html')"><i class="fab fa-bilibili bilibili-icon"></i><span>B站热门视频</span></div>
            <div class="menu-item" onclick="navigateTo('post.html')"><i class="fas fa-newspaper"></i><span>帖子动态</span></div>
            <div class="menu-item" onclick="navigateTo('settings.html')"><i class="fas fa-cog"></i><span>设置</span></div>
            <div class="menu-item" onclick="navigateTo('about.html')"><i class="fas fa-info-circle"></i><span>关于我们</span></div>
        </div>
        <div class="sidebar-footer" style="margin-top: auto; padding: 20px 0; text-align: center;"><p>更多功能开发中...</p></div>
    </div>
    <div class="overlay" id="overlay"></div>
    <div class="notification" id="notification"><i class="fas fa-info-circle"></i><span id="notification-text">正在打开B站APP...</span></div>
        <h1 class="title">B站热门视频</h1>
    </header>
    <main>
        <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> 返回首页</a>
        <h2 class="page-title">全站最热 TOP 10</h2>
        <div class="videos-container" id="videosContainer">
            <div class="loading"><i class="fas fa-spinner"></i><p>加载中...</p></div>
        </div>
    </main>
    <footer>
        <div class="time-display"><i class="fas fa-clock time-icon"></i><span class="time-label">北京时间：</span><span class="time-value" id="beijing-time">00:00:00</span></div>
        <div class="copyright">© 2026 ぼりんの网站 | B站热门视频功能</div>
    </footer>
    <script>
        // 主题管理
        function getBeijingHour() {
            const now = new Date();
            const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
            const beijing = new Date(utc + (3600000 * 8));
            return beijing.getHours();
        }
        
        function initTheme() {
            const savedTheme = getCookie('theme');
            if (savedTheme) {
                setTheme(savedTheme);
            } else {
                const hour = getBeijingHour();
                if (hour >= 6 && hour < 18) {
                    setTheme('light');
                } else {
                    setTheme('dark');
                }
            }
        }
        
        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            const icon = document.querySelector('#themeToggle i');
            if (theme === 'dark') {
                icon.className = 'fas fa-moon';
            } else {
                icon.className = 'fas fa-sun';
            }
            setCookie('theme', theme, 365);
        }
        
        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme');
            setTheme(current === 'dark' ? 'light' : 'dark');
        }
        
        function setCookie(name, value, days) {
            const expires = new Date(Date.now() + days * 864e5).toUTCString();
            document.cookie = name + '=' + encodeURIComponent(value) + '; expires=' + expires + '; path=/';
        }
        
        function getCookie(name) {
            const cookies = document.cookie.split('; ');
            for (let c of cookies) {
                const [k, v] = c.split('=');
                if (k === name) return decodeURIComponent(v);
            }
            return null;
        }
        
        initTheme();
        
        const sidebar = document.getElementById('sidebar');
        const menuToggle = document.getElementById('menuToggle');
        const closeSidebar = document.getElementById('closeSidebar');
        const overlay = document.getElementById('overlay');
        const notification = document.getElementById('notification');
        const notificationText = document.getElementById('notification-text');
        const videosContainer = document.getElementById('videosContainer');
        
        menuToggle.addEventListener('click', function() { sidebar.classList.add('open'); overlay.classList.add('active'); document.body.classList.add('sidebar-open'); });
        function closeSidebarMenu() { sidebar.classList.remove('open'); overlay.classList.remove('active'); document.body.classList.remove('sidebar-open'); }
        closeSidebar.addEventListener('click', closeSidebarMenu);
        overlay.addEventListener('click', closeSidebarMenu);
        function navigateTo(page) { closeSidebarMenu(); setTimeout(() => { window.location.href = page; }, 300); }
        
        // 格式化播放量
        function formatViewCount(count) {
            if (count >= 100000000) return (count / 100000000).toFixed(1) + '亿';
            if (count >= 10000) return (count / 10000).toFixed(1) + '万';
            return count.toString();
        }
        
        // 格式化时长
        function formatDuration(seconds) {
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = seconds % 60;
            if (h > 0) {
                return h + ':' + m.toString().padStart(2, '0') + ':' + s.toString().padStart(2, '0');
            }
            return m + ':' + s.toString().padStart(2, '0');
        }
        
        // 获取B站热门视频
        async function fetchBilibiliHot() {
            try {
                const response = await fetch('/api/bilibili');
                const data = await response.json();
                if (data.success && data.videos) {
                    return data.videos;
                }
                throw new Error(data.error || 'API数据异常');
            } catch (error) {
                console.error('获取B站热门失败:', error);
                return getSampleVideos();
            }
        }
        
        function getSampleVideos() {
            return [
                { bvid: 'BV1xx411c7mD', title: '【热门视频】精彩内容推荐', cover: '', duration: '10:24', up: '热门UP主', views: '100万' },
                { bvid: 'BV1xx411c7mE', title: '今日热点资讯汇总', cover: '', duration: '15:30', up: '资讯频道', views: '89万' },
                { bvid: 'BV1xx411c7mF', title: '超治愈的日常分享', cover: '', duration: '20:15', up: '生活博主', views: '156万' }
            ];
        }
        
        function renderVideos(videos) {
            if (videos.length === 0) {
                videosContainer.innerHTML = '<div class="loading"><i class="fas fa-exclamation-circle"></i><p>无法获取B站热门视频数据</p><button class="refresh-btn" onclick="loadVideos()"><i class="fas fa-sync-alt"></i> 重新加载</button></div>';
                return;
            }
            
            let html = '';
            videos.forEach(video => {
                html += '<div class="video-card" data-bvid="' + video.bvid + '" data-title="' + video.title + '"><div class="video-cover"><div class="cover-placeholder"><i class="fab fa-bilibili"></i></div><img src="' + video.cover + '" alt="' + video.title + '" loading="lazy" onerror="this.style.display=\'none\'" onload="this.style.opacity=\'1\'"><div class="video-duration">' + video.duration + '</div><div class="video-play-btn"><i class="fas fa-play"></i></div></div><div class="video-info"><h3 class="video-title">' + video.title + '</h3><div class="video-stats"><div class="up-name"><i class="fas fa-user"></i> ' + video.up + '</div><div class="views"><i class="fas fa-eye"></i> ' + video.views + '</div></div></div></div>';
            });
            videosContainer.innerHTML = html;
            
            document.querySelectorAll('.video-card').forEach(card => {
                card.addEventListener('click', function() {
                    openBilibiliVideo(this.dataset.bvid, this.dataset.title);
                });
            });
        }
        
        async function loadVideos() {
            videosContainer.innerHTML = '<div class="loading"><i class="fas fa-spinner"></i><p>加载中...</p></div>';
            const videos = await fetchBilibiliHot();
            renderVideos(videos);
        }
        
        function openBilibiliVideo(bvid, title) {
            notificationText.textContent = '正在打开: ' + title;
            notification.classList.add('show');
            try { window.location.href = 'bilibili://video/' + bvid; } catch (e) {}
            setTimeout(function() {
                if (!document.hidden) window.location.href = 'https://www.bilibili.com/video/' + bvid;
                else notification.classList.remove('show');
            }, 1500);
        }
        
        function updateTimeDisplay() {
            const now = new Date();
            const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
            const beijing = new Date(utc + (3600000 * 8));
            document.getElementById('beijing-time').textContent = beijing.getHours().toString().padStart(2, '0') + ':' + beijing.getMinutes().toString().padStart(2, '0') + ':' + beijing.getSeconds().toString().padStart(2, '0');
        }
        
        updateTimeDisplay();
        setInterval(updateTimeDisplay, 1000);
        document.getElementById('searchToggle').addEventListener('click', function() { window.location.href = 'search.html'; });
        loadVideos();
    </script>
</body>
</html>
