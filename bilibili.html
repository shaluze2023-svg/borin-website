<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B站热门视频 - ぼりんの网站</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { min-height: 100vh; background: linear-gradient(-45deg, #1a1a2e, #16213e, #0f3460, #1a1a2e); background-size: 400% 400%; animation: gradientBG 15s ease infinite; color: #f0f0f0; overflow-x: hidden; display: flex; flex-direction: column; }
        body.sidebar-open { overflow: hidden; }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 30px; background: rgba(10, 10, 20, 0.7); backdrop-filter: blur(10px); box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3); position: sticky; top: 0; z-index: 100; }
        .menu-btn, .search-btn { background: none; border: none; color: #f0f0f0; font-size: 1.8rem; cursor: pointer; padding: 10px; border-radius: 50%; transition: all 0.3s ease; display: flex; align-items: center; justify-content: center; z-index: 101; }
        .menu-btn:hover, .search-btn:hover { background: rgba(255, 255, 255, 0.1); transform: scale(1.1); }
        .title { font-size: 2.2rem; font-weight: 700; letter-spacing: 2px; text-shadow: 0 0 15px rgba(100, 150, 255, 0.5); background: linear-gradient(to right, #ff7e5f, #feb47b, #86a8e7, #91eae4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: titleGlow 3s ease-in-out infinite alternate; }
        @keyframes titleGlow { from { text-shadow: 0 0 10px rgba(100, 150, 255, 0.5); } to { text-shadow: 0 0 20px rgba(100, 200, 255, 0.8), 0 0 30px rgba(100, 150, 255, 0.6); } }
        .sidebar { position: fixed; top: 0; left: -350px; width: 350px; height: 100vh; background: rgba(15, 20, 40, 0.95); backdrop-filter: blur(10px); box-shadow: 5px 0 30px rgba(0, 0, 0, 0.5); z-index: 1000; transition: left 0.4s ease; display: flex; flex-direction: column; overflow-y: auto; padding: 20px; }
        .sidebar.open { left: 0; }
        .sidebar-header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; border-bottom: 1px solid rgba(100, 120, 200, 0.3); }
        .close-btn { background: none; border: none; color: #f0f0f0; font-size: 2rem; cursor: pointer; transition: all 0.3s ease; }
        .close-btn:hover { color: #ff7e5f; transform: rotate(90deg); }
        .sidebar-title { font-size: 1.8rem; background: linear-gradient(to right, #86a8e7, #91eae4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .sidebar-menu { padding: 30px 0; }
        .menu-item { padding: 15px 20px; margin: 10px 0; border-radius: 10px; display: flex; align-items: center; transition: all 0.3s ease; cursor: pointer; font-size: 1.2rem; background: rgba(30, 40, 80, 0.5); }
        .menu-item:hover { background: rgba(100, 120, 200, 0.3); transform: translateX(10px); }
        .menu-item i { margin-right: 15px; font-size: 1.5rem; width: 30px; text-align: center; }
        .bilibili-icon { color: #fb7299; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(5px); z-index: 999; opacity: 0; visibility: hidden; transition: all 0.3s ease; }
        .overlay.active { opacity: 1; visibility: visible; }
        main { flex: 1; padding: 30px 20px; max-width: 1400px; margin: 0 auto; }
        .page-title { font-size: 2.5rem; text-align: center; margin: 20px 0 40px; background: linear-gradient(to right, #fb7299, #ffafc9); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-shadow: 0 0 15px rgba(251, 114, 153, 0.3); }
        .videos-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; margin-top: 20px; }
        .video-card { background: rgba(20, 25, 50, 0.6); border-radius: 15px; overflow: hidden; transition: all 0.3s ease; border: 1px solid rgba(100, 120, 200, 0.3); box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3); cursor: pointer; }
        .video-card:hover { transform: translateY(-10px); box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4); border-color: rgba(100, 150, 255, 0.5); }
        .video-cover { position: relative; width: 100%; height: 180px; overflow: hidden; background: linear-gradient(45deg, #2c3e50, #4a6580); display: flex; align-items: center; justify-content: center; }
        .video-cover img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease; }
        .video-card:hover .video-cover img { transform: scale(1.05); }
        .cover-placeholder { position: absolute; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; color: rgba(255, 255, 255, 0.5); font-size: 3rem; z-index: 1; }
        .video-duration { position: absolute; bottom: 10px; right: 10px; background: rgba(0, 0, 0, 0.7); color: #fff; padding: 3px 8px; border-radius: 4px; font-size: 0.9rem; z-index: 2; }
        .video-info { padding: 15px; }
        .video-title { font-size: 1.1rem; margin-bottom: 10px; line-height: 1.4; height: 3.2em; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
        .video-stats { display: flex; justify-content: space-between; color: #a0a0c0; font-size: 0.9rem; margin-top: 10px; }
        .up-name { display: flex; align-items: center; color: #86a8e7; }
        .up-name i { margin-right: 5px; font-size: 0.9rem; }
        .back-btn { display: inline-flex; align-items: center; background: rgba(30, 40, 80, 0.5); color: #f0f0f0; padding: 10px 20px; border-radius: 30px; text-decoration: none; transition: all 0.3s ease; margin-bottom: 30px; border: 1px solid rgba(100, 120, 200, 0.3); }
        .back-btn:hover { background: rgba(100, 120, 200, 0.3); transform: translateX(-5px); }
        .back-btn i { margin-right: 8px; }
        .loading { text-align: center; padding: 50px; font-size: 1.5rem; color: #a0a0c0; }
        .loading i { font-size: 2rem; margin-bottom: 20px; display: block; animation: spin 1.5s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .cover-skeleton { position: absolute; width: 100%; height: 100%; background: linear-gradient(90deg, rgba(30, 40, 70, 0.8) 25%, rgba(50, 70, 100, 0.8) 50%, rgba(30, 40, 70, 0.8) 75%); background-size: 400% 100%; animation: shimmer 1.5s infinite; z-index: 1; }
        @keyframes shimmer { 0% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .video-play-btn { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 60px; height: 60px; background: rgba(251, 114, 153, 0.8); border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 3; opacity: 0; transition: opacity 0.3s ease; }
        .video-card:hover .video-play-btn { opacity: 1; }
        .video-play-btn i { color: white; font-size: 1.8rem; margin-left: 5px; }
        .notification { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(251, 114, 153, 0.9); color: white; padding: 15px 25px; border-radius: 10px; z-index: 2000; display: flex; align-items: center; box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3); opacity: 0; transition: opacity 0.3s ease; }
        .notification.show { opacity: 1; }
        .notification i { margin-right: 10px; font-size: 1.5rem; }
        footer { display: flex; flex-direction: column; align-items: center; text-align: center; padding: 25px; background: rgba(10, 10, 20, 0.85); color: #a0a0c0; border-top: 1px solid rgba(100, 120, 200, 0.2); }
        .time-display { display: flex; justify-content: center; align-items: center; margin-top: 10px; font-size: 1.6rem; color: #fff; background: rgba(30, 40, 70, 0.5); padding: 15px 30px; border-radius: 15px; font-weight: 600; letter-spacing: 1px; box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2); }
        .time-label { color: #86a8e7; margin-right: 10px; }
        .time-value { color: #feb47b; min-width: 170px; text-align: center; }
        .copyright { margin-top: 20px; font-size: 1rem; color: #888; }
        .time-icon { margin-right: 15px; font-size: 1.8rem; color: #ff7e5f; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        .refresh-btn { background: #fb7299; color: white; border: none; padding: 12px 25px; border-radius: 25px; font-size: 1rem; cursor: pointer; transition: all 0.3s ease; margin-top: 20px; }
        .refresh-btn:hover { background: #e55a80; transform: translateY(-2px); }
        @media (max-width: 768px) { .title { font-size: 1.8rem; } .sidebar { width: 280px; left: -280px; } .videos-container { grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); } .page-title { font-size: 2rem; } }
        @media (max-width: 480px) { header { padding: 15px 20px; } .title { font-size: 1.5rem; } .menu-btn, .search-btn { font-size: 1.5rem; } .sidebar { width: 100%; left: -100%; } .videos-container { grid-template-columns: 1fr; } .page-title { font-size: 1.8rem; } .video-cover { height: 150px; } .video-play-btn { width: 50px; height: 50px; } }
    </style>
</head>
<body>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2 class="sidebar-title">ぼりんの菜单</h2>
            <button class="close-btn" id="closeSidebar"><i class="fas fa-times"></i></button>
        </div>
        <div class="sidebar-menu">
            <div class="menu-item" onclick="navigateTo('bilibili.html')"><i class="fab fa-bilibili bilibili-icon"></i><span>B站热门视频</span></div>
            <div class="menu-item" onclick="navigateTo('settings.html')"><i class="fas fa-cog"></i><span>设置</span></div>
            <div class="menu-item" onclick="navigateTo('about.html')"><i class="fas fa-info-circle"></i><span>关于我们</span></div>
        </div>
        <div class="sidebar-footer" style="margin-top: auto; padding: 20px 0; text-align: center;"><p>更多功能开发中...</p></div>
    </div>
    <div class="overlay" id="overlay"></div>
    <div class="notification" id="notification"><i class="fas fa-info-circle"></i><span id="notification-text">正在打开B站APP...</span></div>
    <header>
        <button class="menu-btn" id="menuToggle"><i class="fas fa-bars"></i></button>
        <h1 class="title">B站热门视频</h1>
        <button class="search-btn" id="searchToggle"><i class="fas fa-search"></i></button>
    </header>
    <main>
        <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> 返回首页</a>
        <h2 class="page-title">今日B站热门视频 TOP 30</h2>
        <div class="videos-container" id="videosContainer">
            <div class="loading"><i class="fas fa-spinner"></i><p>加载中...</p></div>
        </div>
    </main>
    <footer>
        <div class="time-display"><i class="fas fa-clock time-icon"></i><span class="time-label">北京时间：</span><span class="time-value" id="beijing-time">00:00:00</span></div>
        <div class="copyright">© 2026 ぼりんの网站 | B站热门视频功能</div>
    </footer>
    <script>
        const sidebar = document.getElementById('sidebar');
        const menuToggle = document.getElementById('menuToggle');
        const closeSidebar = document.getElementById('closeSidebar');
        const overlay = document.getElementById('overlay');
        const notification = document.getElementById('notification');
        const notificationText = document.getElementById('notification-text');
        const videosContainer = document.getElementById('videosContainer');
        
        menuToggle.addEventListener('click', function() { sidebar.classList.add('open'); overlay.classList.add('active'); document.body.classList.add('sidebar-open'); });
        function closeSidebarMenu() { sidebar.classList.remove('open'); overlay.classList.remove('active'); document.body.classList.remove('sidebar-open'); }
        closeSidebar.addEventListener('click', closeSidebarMenu);
        overlay.addEventListener('click', closeSidebarMenu);
        function navigateTo(page) { closeSidebarMenu(); setTimeout(() => { window.location.href = page; }, 300); }
        
        // 示例视频数据（静态版本）
        const sampleVideos = [
            { bvid: 'BV1xx411c7mD', title: '【2024年度总结】这一年的精彩瞬间', cover: 'https://i0.hdslb.com/bfs/archive/aaa1.jpg', duration: '10:24', up: 'ぼりん', views: '123.4万' },
            { bvid: 'BV1xx411c7mE', title: '程序员的一天：从早到晚的奋斗', cover: 'https://i0.hdslb.com/bfs/archive/bbb2.jpg', duration: '15:30', up: '技术宅', views: '89.2万' },
            { bvid: 'BV1xx411c7mF', title: '超治愈！日本街头漫步', cover: 'https://i0.hdslb.com/bfs/archive/ccc3.jpg', duration: '20:15', up: '旅行者', views: '156.7万' },
            { bvid: 'BV1xx411c7mG', title: '【原神】4.0版本全新角色演示', cover: 'https://i0.hdslb.com/bfs/archive/ddd4.jpg', duration: '03:42', up: '原神官方', views: '567.8万' },
            { bvid: 'BV1xx411c7mH', title: '一秒入睡的神器推荐！', cover: 'https://i0.hdslb.com/bfs/archive/eee5.jpg', duration: '08:56', up: '生活达人', views: '45.3万' },
            { bvid: 'BV1xx411c7mI', title: '【音乐】2024最火歌曲合集', cover: 'https://i0.hdslb.com/bfs/archive/fff6.jpg', duration: '45:20', up: '音乐分享', views: '234.5万' },
            { bvid: 'BV1xx411c7mJ', title: '超简单的家常菜教程', cover: 'https://i0.hdslb.com/bfs/archive/ggg7.jpg', duration: '12:33', up: '美食家', views: '78.9万' },
            { bvid: 'BV1xx411c7mK', title: '【游戏】王者荣耀新赛季攻略', cover: 'https://i0.hdslb.com/bfs/archive/hhh8.jpg', duration: '18:45', up: '游戏解说', views: '345.6万' },
            { bvid: 'BV1xx411c7mL', title: '可爱的猫咪日常', cover: 'https://i0.hdslb.com/bfs/archive/iii9.jpg', duration: '05:22', up: '萌宠达人', views: '678.9万' },
            { bvid: 'BV1xx411c7mM', title: 'Python入门教程完整版', cover: 'https://i0.hdslb.com/bfs/archive/jjj10.jpg', duration: '120:00', up: '编程教学', views: '123.4万' },
            { bvid: 'BV1xx411c7mN', title: '【动画】精彩新番推荐', cover: 'https://i0.hdslb.com/bfs/archive/kkk11.jpg', duration: '25:30', up: '动漫迷', views: '234.5万' },
            { bvid: 'BV1xx411c7mO', title: '健身达人的一天', cover: 'https://i0.hdslb.com/bfs/archive/lll12.jpg', duration: '15:20', up: '健身教练', views: '89.7万' }
        ];
        
        // 从B站API获取热门视频（通过CORS代理）
        async function fetchBilibiliHot() {
            try {
                // 使用公开的B站热门API
                const response = await fetch('https://api.bilibili.com/x/web-interface/popular?ps=30');
                const data = await response.json();
                if (data.code === 0 && data.data && data.data.list) {
                    return data.data.list.map(item => ({
                        bvid: item.bvid,
                        title: item.title,
                        cover: item.pic,
                        duration: item.duration > 3600 ? Math.floor(item.duration/3600) + ':' + Math.floor((item.duration%3600)/60).toString().padStart(2,'0') + ':' + (item.duration%60).toString().padStart(2,'0') : Math.floor(item.duration/60) + ':' + (item.duration%60).toString().padStart(2,'0'),
                        up: item.owner.name,
                        views: formatViewCount(item.stat.view)
                    }));
                }
                throw new Error('API返回数据异常');
            } catch (error) {
                console.log('B站API获取失败，使用本地数据:', error);
                return sampleVideos;
            }
        }
        
        function formatViewCount(count) {
            if (count >= 10000) {
                return (count / 10000).toFixed(1) + '万';
            }
            return count.toString();
        }
        
        function renderVideos(videos) {
            if (videos.length === 0) {
                videosContainer.innerHTML = '<div class="loading"><i class="fas fa-exclamation-circle"></i><p>无法获取B站热门视频数据</p><button class="refresh-btn" onclick="loadVideos()"><i class="fas fa-sync-alt"></i> 重新加载</button></div>';
                return;
            }
            
            let html = '';
            videos.forEach(video => {
                html += `
                <div class="video-card" data-bvid="${video.bvid}" data-title="${video.title}">
                    <div class="video-cover">
                        <div class="cover-skeleton"></div>
                        <div class="cover-placeholder"><i class="fab fa-bilibili"></i></div>
                        <img src="${video.cover}" alt="${video.title}" loading="lazy" onerror="this.style.display='none'" onload="this.style.opacity='1'">
                        <div class="video-duration">${video.duration}</div>
                        <div class="video-play-btn"><i class="fas fa-play"></i></div>
                    </div>
                    <div class="video-info">
                        <h3 class="video-title">${video.title}</h3>
                        <div class="video-stats">
                            <div class="up-name"><i class="fas fa-user"></i> ${video.up}</div>
                            <div class="views"><i class="fas fa-eye"></i> ${video.views}</div>
                        </div>
                    </div>
                </div>`;
            });
            videosContainer.innerHTML = html;
            
            // 添加点击事件
            document.querySelectorAll('.video-card').forEach(card => {
                card.addEventListener('click', function() {
                    const bvid = this.dataset.bvid;
                    const title = this.dataset.title;
                    openBilibiliVideo(bvid, title);
                });
            });
        }
        
        async function loadVideos() {
            videosContainer.innerHTML = '<div class="loading"><i class="fas fa-spinner"></i><p>加载中...</p></div>';
            const videos = await fetchBilibiliHot();
            renderVideos(videos);
        }
        
        function openBilibiliVideo(bvid, title) {
            notificationText.textContent = '正在打开: ' + title;
            notification.classList.add('show');
            
            try {
                const appLink = 'bilibili://video/' + bvid;
                window.location.href = appLink;
            } catch (e) {
                console.error('打开APP失败:', e);
            }
            
            setTimeout(function() {
                if (!document.hidden) {
                    window.location.href = 'https://www.bilibili.com/video/' + bvid;
                } else {
                    notification.classList.remove('show');
                }
            }, 1500);
        }
        
        function getBeijingTime() { const now = new Date(); const utc = now.getTime() + (now.getTimezoneOffset() * 60000); return new Date(utc + (3600000 * 8)); }
        function formatTime(num) { return num.toString().padStart(2, '0'); }
        function updateTimeDisplay() {
            const now = getBeijingTime();
            document.getElementById('beijing-time').textContent = formatTime(now.getHours()) + ':' + formatTime(now.getMinutes()) + ':' + formatTime(now.getSeconds());
            const timeValue = document.querySelector('.time-value');
            timeValue.style.opacity = timeValue.style.opacity === '0.8' ? '1' : '0.8';
        }
        
        updateTimeDisplay();
        setInterval(updateTimeDisplay, 1000);
        document.getElementById('searchToggle').addEventListener('click', function() { window.location.href = 'search.html'; });
        
        // 页面加载时获取视频
        loadVideos();
        
        setTimeout(() => { notification.classList.remove('show'); }, 3000);
    </script>
</body>
</html>
