<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>API测试</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .success { color: green; }
        .error { color: red; }
        .section { margin: 20px 0; padding: 15px; border: 1px solid #ccc; border-radius: 8px; }
    </style>
</head>
<body>
    <h1>API测试</h1>
    
    <div class="section">
        <h2>1. Posts测试</h2>
        <div id="posts-result">测试中...</div>
    </div>
    
    <div class="section">
        <h2>2. Bilibili测试</h2>
        <div id="bili-result">测试中...</div>
    </div>
    
    <script>
        // Posts测试
        async function testPosts() {
            const div = document.getElementById('posts-result');
            try {
                const res = await fetch('https://api.jsonbin.io/v3/b/69abb4bbd0ea881f40f802db/latest');
                const data = await res.json();
                const posts = data.record?.posts || [];
                
                // 检查tags
                let hasError = false;
                posts.forEach(p => {
                    if (!p.tags) {
                        div.innerHTML += `<p class="error">Post ${p.id} 缺少tags字段!</p>`;
                        hasError = true;
                    }
                });
                
                if (!hasError) {
                    div.innerHTML = `<p class="success">✓ Posts正常 (${posts.length}条)</p>`;
                    posts.forEach(p => {
                        div.innerHTML += `<p>- ${p.title} (tags: ${JSON.stringify(p.tags)})</p>`;
                    });
                }
            } catch (e) {
                div.innerHTML = `<p class="error">错误: ${e.message}</p>`;
            }
        }
        
        // Bilibili测试
        async function testBilibili() {
            const div = document.getElementById('bili-result');
            try {
                div.innerHTML = '<p>请求中...</p>';
                
                const res = await fetch('https://api.jsonbin.io/v3/b/69abb4bbd0ea881f40f802db/latest');
                div.innerHTML += `<p>响应状态: ${res.status}</p>`;
                
                const data = await res.json();
                div.innerHTML += `<p>data keys: ${Object.keys(data).join(', ')}</p>`;
                
                if (data.record && data.record.bilibili && data.record.bilibili.videos) {
                    const videos = data.record.bilibili.videos;
                    div.innerHTML += `<p class="success">✓ Videos正常 (${videos.length}条)</p>`;
                    videos.slice(0, 3).forEach(v => {
                        div.innerHTML += `<p>- ${v.bvid}: ${v.title.substring(0, 25)}...</p>`;
                    });
                } else {
                    div.innerHTML += `<p class="error">数据结构错误!</p>`;
                    div.innerHTML += `<pre>${JSON.stringify(data, null, 2).substring(0, 500)}</pre>`;
                }
            } catch (e) {
                div.innerHTML = `<p class="error">错误: ${e.message}</p>`;
            }
        }
        
        testPosts();
        testBilibili();
    </script>
</body>
</html>
