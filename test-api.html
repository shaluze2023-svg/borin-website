<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>API测试</title>
</head>
<body>
    <h1>JSONBin API 测试</h1>
    <div id="result">测试中...</div>
    <div id="error" style="color:red"></div>
    
    <script>
        async function test() {
            const resultDiv = document.getElementById('result');
            const errorDiv = document.getElementById('error');
            
            try {
                resultDiv.textContent = '正在请求...';
                
                const response = await fetch('https://api.jsonbin.io/v3/b/69abb4bbd0ea881f40f802db/latest');
                resultDiv.textContent = '响应状态: ' + response.status;
                
                const data = await response.json();
                
                const posts = data.record?.posts || [];
                const videos = data.record?.bilibili?.videos || [];
                
                resultDiv.innerHTML = 
                    '<h2>成功!</h2>' +
                    '<p>帖子数量: ' + posts.length + '</p>' +
                    '<p>视频数量: ' + videos.length + '</p>' +
                    '<h3>视频列表:</h3>' +
                    videos.map(v => '<p>' + v.bvid + ': ' + v.title + '</p>').join('');
                    
            } catch (error) {
                errorDiv.textContent = '错误: ' + error.message;
                resultDiv.textContent = '失败';
            }
        }
        
        test();
    </script>
</body>
</html>
