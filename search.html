<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>搜索 - ぼりんの网站</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-primary: #f0f0f5; --bg-secondary: #ffffff; --bg-card: rgba(255, 255, 255, 0.8); --text-primary: #1a1a2e; --text-secondary: #666680; --accent: #fb7299; --border: rgba(100, 120, 200, 0.2); --shadow: rgba(0, 0, 0, 0.1); --gradient-1: #e8e8f0; --gradient-2: #d0d0e0; --gradient-3: #c0c0d8; --gradient-4: #e8e8f0; --header-bg: rgba(255, 255, 255, 0.9); --sidebar-bg: rgba(245, 245, 250, 0.95); --footer-bg: rgba(245, 245, 250, 0.9); --time-bg: rgba(230, 230, 240, 0.8); --input-bg: rgba(230, 230, 240, 0.6);
        }
        [data-theme="dark"] {
            --bg-primary: #1a1a2e; --bg-secondary: #16213e; --bg-card: rgba(20, 25, 50, 0.6); --text-primary: #f0f0f0; --text-secondary: #a0a0c0; --accent: #fb7299; --border: rgba(100, 120, 200, 0.3); --shadow: rgba(0, 0, 0, 0.3); --gradient-1: #1a1a2e; --gradient-2: #16213e; --gradient-3: #0f3460; --gradient-4: #1a1a2e; --header-bg: rgba(10, 10, 20, 0.7); --sidebar-bg: rgba(15, 20, 40, 0.95); --footer-bg: rgba(10, 10, 20, 0.85); --time-bg: rgba(30, 40, 70, 0.5); --input-bg: rgba(30, 40, 70, 0.5);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { min-height: 100vh; background: linear-gradient(-45deg, var(--gradient-1), var(--gradient-2), var(--gradient-3), var(--gradient-4)); background-size: 400% 400%; animation: gradientBG 15s ease infinite; color: var(--text-primary); overflow-x: hidden; display: flex; flex-direction: column; transition: all 0.3s ease; }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 30px; background: var(--header-bg); backdrop-filter: blur(10px); box-shadow: 0 4px 20px var(--shadow); position: sticky; top: 0; z-index: 100; }
        .menu-btn, .search-btn { background: none; border: none; color: var(--text-primary); font-size: 1.8rem; cursor: pointer; padding: 10px; border-radius: 50%; transition: all 0.3s ease; }
        .title { font-size: 2.2rem; font-weight: 700; letter-spacing: 2px; background: linear-gradient(to right, #ff7e5f, #feb47b, #86a8e7, #91eae4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .sidebar { position: fixed; top: 0; left: -350px; width: 350px; height: 100vh; background: var(--sidebar-bg); backdrop-filter: blur(10px); z-index: 1000; transition: left 0.4s ease; padding: 20px; }
        .sidebar.open { left: 0; }
        .sidebar-header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; border-bottom: 1px solid var(--border); }
        .close-btn { background: none; border: none; color: var(--text-primary); font-size: 2rem; cursor: pointer; }
        .sidebar-title { font-size: 1.8rem; background: linear-gradient(to right, #86a8e7, #91eae4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .sidebar-menu { padding: 30px 0; }
        .menu-item { padding: 15px 20px; margin: 10px 0; border-radius: 10px; display: flex; align-items: center; transition: all 0.3s ease; cursor: pointer; background: var(--bg-card); border: 1px solid var(--border); }
        .menu-item:hover { background: rgba(251, 114, 153, 0.2); }
        .menu-item i { margin-right: 15px; font-size: 1.5rem; }
        .bilibili-icon { color: #fb7299; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(5px); z-index: 999; opacity: 0; visibility: hidden; transition: all 0.3s ease; }
        .overlay.active { opacity: 1; visibility: visible; }
        main { flex: 1; padding: 40px 20px; display: flex; flex-direction: column; align-items: center; }
        .search-container { max-width: 600px; width: 100%; background: var(--bg-card); border-radius: 20px; padding: 40px; border: 1px solid var(--border); box-shadow: 0 10px 30px var(--shadow); }
        .search-title { font-size: 2.5rem; margin-bottom: 30px; color: #feb47b; text-align: center; }
        .back-btn { display: inline-flex; align-items: center; background: var(--bg-card); color: var(--text-primary); padding: 10px 20px; border-radius: 30px; text-decoration: none; margin-bottom: 30px; border: 1px solid var(--border); }
        .back-btn i { margin-right: 8px; }
        .search-box { display: flex; gap: 10px; margin-bottom: 20px; }
        .search-input { flex: 1; padding: 15px 20px; border: 2px solid var(--border); border-radius: 30px; background: var(--input-bg); color: var(--text-primary); font-size: 1.1rem; }
        .search-input:focus { outline: none; border-color: #86a8e7; }
        .search-btn-main { padding: 15px 30px; background: #fb7299; color: white; border: none; border-radius: 30px; font-size: 1.1rem; cursor: pointer; transition: all 0.3s ease; }
        .search-btn-main:hover { background: #e55a80; }
        .search-results { margin-top: 20px; }
        .result-item { padding: 15px; background: var(--input-bg); border-radius: 10px; margin-bottom: 10px; cursor: pointer; transition: all 0.3s ease; border: 1px solid transparent; }
        .result-item:hover { border-color: #fb7299; }
        .result-title { font-weight: 600; margin-bottom: 5px; }
        .result-desc { font-size: 0.9rem; color: var(--text-secondary); }
        .search-tip { text-align: center; color: var(--text-secondary); margin-top: 30px; }
        footer { display: flex; flex-direction: column; align-items: center; padding: 25px; background: var(--footer-bg); color: var(--text-secondary); border-top: 1px solid var(--border); }
        .time-display { display: flex; align-items: center; font-size: 1.6rem; color: var(--text-primary); background: var(--time-bg); padding: 15px 30px; border-radius: 15px; }
        .time-label { color: #86a8e7; margin-right: 10px; }
        .time-value { color: #feb47b; }
        .copyright { margin-top: 20px; font-size: 1rem; }
        .time-icon { margin-right: 15px; font-size: 1.8rem; color: #ff7e5f; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        .loading { text-align: center; padding: 20px; color: var(--text-secondary); }
    </style>
<script src="protect.js"></script></head>
<body>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2 class="sidebar-title">ぼりんの菜单</h2>
            <button class="close-btn" id="closeSidebar"><i class="fas fa-times"></i></button>
        </div>
        <div class="sidebar-menu">
            <div class="menu-item" onclick="navigateTo('bilibili.html')"><i class="fab fa-bilibili bilibili-icon"></i><span>B站热门视频</span></div>
            <div class="menu-item" onclick="navigateTo('post.html')"><i class="fas fa-newspaper"></i><span>帖子动态</span></div>
            <div class="menu-item" onclick="navigateTo('settings.html')"><i class="fas fa-cog"></i><span>设置</span></div>
            <div class="menu-item" onclick="navigateTo('about.html')"><i class="fas fa-info-circle"></i><span>关于我们</span></div>
        </div>
    </div>
    <div class="overlay" id="overlay"></div>
        <h1 class="title">搜索</h1>
        <button class="search-btn" id="searchToggle"><i class="fas fa-search"></i></button>
    </header>
    <main>
        <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> 返回首页</a>
        <div class="search-container">
            <h2 class="search-title">站内搜索</h2>
            <div class="search-box">
                <input type="text" class="search-input" id="searchInput" placeholder="输入关键词搜索..." onkeypress="if(event.key==='Enter')performSearch()">
                <button class="search-btn-main" onclick="performSearch()"><i class="fas fa-search"></i></button>
            </div>
            <div class="search-results" id="searchResults"></div>
            <p class="search-tip">提示：可以搜索B站视频或站内内容</p>
        </div>
    </main>
    <footer>
        <div class="time-display"><i class="fas fa-clock time-icon"></i><span class="time-label">北京时间：</span><span class="time-value" id="beijing-time">00:00:00</span></div>
        <div class="copyright">© 2026 ぼりんの网站 | 搜索页面</div>
    </footer>
    <script>
        function getBeijingHour() { const now = new Date(); const utc = now.getTime() + (now.getTimezoneOffset() * 60000); return new Date(utc + (3600000 * 8)).getHours(); }
        function initTheme() { const saved = getCookie('theme'); if (saved) applyTheme(saved); else applyTheme(getBeijingHour() >= 6 && getBeijingHour() < 18 ? 'light' : 'dark'); }
        function applyTheme(theme) { document.documentElement.setAttribute('data-theme', theme); document.querySelector('#themeToggle i').className = theme === 'dark' ? 'fas fa-moon' : 'fas fa-sun'; }
        function toggleTheme() { applyTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'); }
        function setCookie(name, value, days) { document.cookie = name + '=' + encodeURIComponent(value) + '; expires=' + new Date(Date.now() + days * 864e5).toUTCString() + '; path=/'; }
        function getCookie(name) { const c = document.cookie.split('; ').find(row => row.startsWith(name + '=')); return c ? decodeURIComponent(c.split('=')[1]) : null; }
        initTheme();
        const sidebar = document.getElementById('sidebar'), overlay = document.getElementById('overlay');
        document.getElementById('menuToggle').addEventListener('click', () => { sidebar.classList.add('open'); overlay.classList.add('active'); });
        document.getElementById('closeSidebar').addEventListener('click', () => { sidebar.classList.remove('open'); overlay.classList.remove('active'); });
        overlay.addEventListener('click', () => { sidebar.classList.remove('open'); overlay.classList.remove('active'); });
        function navigateTo(page) { sidebar.classList.remove('open'); overlay.classList.remove('active'); setTimeout(() => { window.location.href = page; }, 300); }
        
        async function performSearch() {
            const query = document.getElementById('searchInput').value.trim();
            if (!query) return;
            const resultsDiv = document.getElementById('searchResults');
            resultsDiv.innerHTML = '<div class="loading"><i class="fas fa-spinner fa-spin"></i> 搜索中...</div>';
            try {
                const response = await fetch('https://api.bilibili.com/x/web-interface/search/type?keyword=' + encodeURIComponent(query) + '&search_type=video');
                const data = await response.json();
                if (data.code === 0 && data.data && data.data.result) {
                    let html = '';
                    data.data.result.slice(0, 10).forEach(item => {
                        html += '<div class="result-item" onclick="openVideo(\'' + item.bvid + '\')"><div class="result-title">' + item.title.replace(/<em class="keyword">/g, '').replace(/<\/em>/g, '') + '</div><div class="result-desc">播放: ' + (item.play ? item.play : 0) + ' | ' + (item.author || '未知UP主') + '</div></div>';
                    });
                    resultsDiv.innerHTML = html || '<p style="text-align:center;color:var(--text-secondary)">未找到相关结果</p>';
                } else { resultsDiv.innerHTML = '<p style="text-align:center;color:var(--text-secondary)">搜索失败，请稍后重试</p>'; }
            } catch (e) { resultsDiv.innerHTML = '<p style="text-align:center;color:var(--text-secondary)">网络错误，请稍后重试</p>'; }
        }
        function openVideo(bvid) { window.location.href = 'https://www.bilibili.com/video/' + bvid; }
        function updateTimeDisplay() { const now = new Date(); const utc = now.getTime() + (now.getTimezoneOffset() * 60000); const bj = new Date(utc + (3600000 * 8)); document.getElementById('beijing-time').textContent = bj.getHours().toString().padStart(2, '0') + ':' + bj.getMinutes().toString().padStart(2, '0') + ':' + bj.getSeconds().toString().padStart(2, '0'); }
        updateTimeDisplay(); setInterval(updateTimeDisplay, 1000);
        document.getElementById('searchToggle').addEventListener('click', performSearch);
    </script>
</body>
</html>
