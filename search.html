<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>搜索 - ぼりんの网站</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-card: rgba(255, 255, 255, 0.85); --text-primary: #3d2c29; --text-secondary: #8b7068; --accent: #fb7299; --border: rgba(251, 114, 153, 0.15); --shadow: rgba(251, 114, 153, 0.08); --gradient-1: #fff0eb; --gradient-2: #ffe4dc; --gradient-3: #ffd6cc; --gradient-4: #ffeee8; --header-bg: rgba(255, 255, 255, 0.92); --footer-bg: rgba(255, 248, 245, 0.92); --time-bg: rgba(255, 230, 220, 0.7); --input-bg: rgba(230, 230, 240, 0.6); }
        [data-theme="dark"] { --bg-card: rgba(20, 25, 50, 0.6); --text-primary: #f0f0f0; --text-secondary: #a0a0c0; --gradient-1: #1a1a2e; --gradient-2: #16213e; --gradient-3: #0f3460; --gradient-4: #1a1a2e; --header-bg: rgba(10, 10, 20, 0.7); --footer-bg: rgba(10, 10, 20, 0.85); --time-bg: rgba(30, 40, 70, 0.5); --input-bg: rgba(30, 40, 70, 0.5); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { min-height: 100vh; background: linear-gradient(-45deg, var(--gradient-1), var(--gradient-2), var(--gradient-3), var(--gradient-4)); background-size: 400% 400%; animation: gradientBG 15s ease infinite; color: var(--text-primary); display: flex; flex-direction: column; transition: all 0.3s ease; }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 30px; background: var(--header-bg); backdrop-filter: blur(10px); box-shadow: 0 4px 20px var(--shadow); position: sticky; top: 0; z-index: 100; }
        .back-btn, .menu-btn { background: none; border: none; color: var(--text-primary); font-size: 1.8rem; cursor: pointer; padding: 10px; border-radius: 50%; transition: all 0.3s ease; display: flex; align-items: center; justify-content: center; text-decoration: none; }
        .back-btn:hover, .menu-btn:hover { background: rgba(128, 128, 128, 0.2); transform: scale(1.1); }
        .title { font-size: 2.2rem; font-weight: 700; letter-spacing: 2px; background: linear-gradient(to right, #ff7e5f, #feb47b, #86a8e7, #91eae4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        main { flex: 1; padding: 40px 20px; display: flex; flex-direction: column; align-items: center; }
        .search-container { max-width: 800px; width: 100%; }
        .search-box { display: flex; gap: 15px; margin-bottom: 30px; }
        .search-input { flex: 1; padding: 15px 20px; background: var(--bg-card); border: 2px solid var(--border); border-radius: 15px; color: var(--text-primary); font-size: 1.1rem; }
        .search-input:focus { outline: none; border-color: var(--accent); }
        .search-btn { padding: 15px 30px; background: linear-gradient(135deg, #fb7299, #ff7e5f); color: white; border: none; border-radius: 15px; font-size: 1.1rem; cursor: pointer; transition: all 0.3s ease; }
        .search-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(251, 114, 153, 0.4); }
        .search-tips { background: var(--bg-card); border-radius: 15px; padding: 20px; margin-bottom: 20px; border: 1px solid var(--border); }
        .search-tips h3 { color: #86a8e7; margin-bottom: 10px; font-size: 1rem; }
        .search-tips p { color: var(--text-secondary); font-size: 0.9rem; line-height: 1.6; }
        .results-section { background: var(--bg-card); border-radius: 20px; padding: 25px; border: 1px solid var(--border); }
        .results-title { font-size: 1.3rem; color: #feb47b; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        .results-title i { color: var(--accent); }
        .result-category { margin-bottom: 25px; }
        .result-category h4 { color: #86a8e7; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
        .result-item { padding: 15px; background: var(--input-bg); border-radius: 10px; margin-bottom: 10px; cursor: pointer; transition: all 0.3s ease; display: flex; align-items: center; gap: 15px; }
        .result-item:hover { background: rgba(251, 114, 153, 0.1); transform: translateX(5px); }
        .result-item i { font-size: 1.5rem; color: var(--accent); }
        .result-item-content h5 { font-size: 1.1rem; margin-bottom: 5px; }
        .result-item-content p { font-size: 0.9rem; color: var(--text-secondary); }
        .result-tag { display: inline-block; background: rgba(251, 114, 153, 0.2); color: var(--accent); padding: 2px 8px; border-radius: 10px; font-size: 0.8rem; margin-left: 10px; }
        .no-results { text-align: center; padding: 40px; color: var(--text-secondary); }
        .no-results i { font-size: 3rem; margin-bottom: 15px; display: block; opacity: 0.5; }
        footer { display: flex; flex-direction: column; align-items: center; padding: 25px; background: var(--footer-bg); border-top: 1px solid var(--border); }
        .time-display { display: flex; align-items: center; font-size: 1.6rem; color: var(--text-primary); background: var(--time-bg); padding: 15px 30px; border-radius: 15px; }
        .time-label { color: #86a8e7; margin-right: 10px; }
        .time-value { color: #feb47b; }
        .copyright { margin-top: 20px; color: var(--text-secondary); }
        .time-icon { margin-right: 15px; color: #ff7e5f; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
    </style>
    <script src="protect.js"></script>
</head>
<body>
    <header>
        <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
        <h1 class="title">搜索</h1>
        <button class="menu-btn" onclick="location.href='index.html'"><i class="fas fa-home"></i></button>
    </header>
    
    <main>
        <div class="search-container">
            <div class="search-box">
                <input type="text" class="search-input" id="searchInput" placeholder="搜索功能、帖子、标签..." autofocus>
                <button class="search-btn" onclick="performSearch()"><i class="fas fa-search"></i></button>
            </div>
            
            <div class="search-tips">
                <h3><i class="fas fa-lightbulb"></i> 搜索提示</h3>
                <p>• 输入关键词搜索网站功能和帖子内容<br>• 使用 #标签 搜索特定标签的帖子<br>• 支持搜索：设置、B站视频、关于、帖子标题、帖子内容、标签</p>
            </div>
            
            <div class="results-section">
                <h3 class="results-title"><i class="fas fa-search"></i> 搜索结果 <span id="resultCount"></span></h3>
                <div id="resultsContent">
                    <div class="no-results"><i class="fas fa-hand-point-up"></i><p>输入关键词开始搜索</p></div>
                </div>
            </div>
        </div>
    </main>
    
    <footer>
        <div class="copyright">© 2026 ぼりんの网站 | 搜索页面</div>
    </footer>
    
    <script>
        // 配置
        const _c = {b:'69a8140243b1c97be9b266ab',k:'H2JFMGgdaWvqVWl0L1eFy.Vo/pkShpTWl3F.t2OEse8bkcC97anhy'};
        const API_URL = 'https://api.jsonbin.io/v3/b/' + _c.b;
        
        let posts = [];
        
        // 功能菜单数据
        const menuItems = [
            { name: 'B站热门视频', desc: '查看B站热门视频排行', icon: 'fab fa-bilibili', url: 'bilibili.html', color: '#fb7299', keywords: ['b站', 'bilibili', '视频', '热门'] },
            { name: '帖子动态', desc: '浏览和发布帖子', icon: 'fas fa-newspaper', url: 'post.html', color: '#91eae4', keywords: ['帖子', '动态', '发布', '文章'] },
            { name: '设置', desc: '自定义网站主题和偏好', icon: 'fas fa-cog', url: 'settings.html', color: '#86a8e7', keywords: ['设置', '主题', '偏好', '配置'] },
            { name: '关于我们', desc: '了解更多关于这个网站', icon: 'fas fa-info-circle', url: 'about.html', color: '#feb47b', keywords: ['关于', '我们', '介绍'] }
        ];
        
        // 工具函数
        function getBeijingHour() { const n = new Date(), u = n.getTime() + n.getTimezoneOffset() * 60000; return new Date(u + 28800000).getHours(); }
        function initTheme() { const s = getCookie('theme'); applyTheme(s || (getBeijingHour() >= 6 && getBeijingHour() < 18 ? 'light' : 'dark')); }
        function applyTheme(t) { document.documentElement.setAttribute('data-theme', t); }
        function getCookie(n) { const c = document.cookie.split('; ').find(r => r.startsWith(n + '=')); return c ? decodeURIComponent(c.split('=')[1]) : null; }
        
        initTheme();
        
        // 加载帖子
        async function loadPosts() {
            try {
                const res = await fetch(API_URL + '/latest', { headers: { 'X-Master-Key': '$2a$10$' + _c.k } });
                if (res.ok) { const d = await res.json(); posts = d.record.posts || []; }
            } catch(e) { posts = JSON.parse(localStorage.getItem('borin_posts') || '[]'); }
        }
        
        // 搜索函数
        function performSearch() {
            const query = document.getElementById('searchInput').value.trim().toLowerCase();
            const resultsDiv = document.getElementById('resultsContent');
            const countSpan = document.getElementById('resultCount');
            
            if (!query) {
                resultsDiv.innerHTML = '<div class="no-results"><i class="fas fa-hand-point-up"></i><p>输入关键词开始搜索</p></div>';
                countSpan.textContent = '';
                return;
            }
            
            let results = [];
            
            // 搜索菜单项
            menuItems.forEach(item => {
                if (item.name.toLowerCase().includes(query) || 
                    item.desc.toLowerCase().includes(query) ||
                    item.keywords.some(k => k.includes(query))) {
                    results.push({ type: 'menu', item });
                }
            });
            
            // 搜索帖子
            posts.forEach(post => {
                const titleMatch = post.title.toLowerCase().includes(query);
                const contentMatch = post.content.toLowerCase().includes(query);
                const tagMatch = post.tags.some(t => t.toLowerCase().includes(query) || query.includes(t.toLowerCase()));
                const hashMatch = query.startsWith('#') && post.tags.some(t => t.toLowerCase() === query.substring(1).toLowerCase());
                
                if (titleMatch || contentMatch || tagMatch || hashMatch) {
                    results.push({ type: 'post', item: post, match: { title: titleMatch, content: contentMatch, tag: tagMatch || hashMatch } });
                }
            });
            
            countSpan.textContent = `(${results.length} 条结果)`;
            
            if (results.length === 0) {
                resultsDiv.innerHTML = '<div class="no-results"><i class="fas fa-search"></i><p>未找到相关结果</p></div>';
                return;
            }
            
            let html = '';
            
            // 分类显示
            const menuResults = results.filter(r => r.type === 'menu');
            const postResults = results.filter(r => r.type === 'post');
            
            if (menuResults.length > 0) {
                html += '<div class="result-category"><h4><i class="fas fa-th-large"></i> 功能菜单</h4>';
                menuResults.forEach(r => {
                    html += '<div class="result-item" onclick="location.href=\'' + r.item.url + '\'"><i class="' + r.item.icon + '" style="color:' + r.item.color + '"></i><div class="result-item-content"><h5>' + r.item.name + '</h5><p>' + r.item.desc + '</p></div></div>';
                });
                html += '</div>';
            }
            
            if (postResults.length > 0) {
                html += '<div class="result-category"><h4><i class="fas fa-newspaper"></i> 相关帖子</h4>';
                postResults.forEach(r => {
                    const tags = r.item.tags.map(t => '<span class="result-tag">#' + t + '</span>').join(' ');
                    html += '<div class="result-item" onclick="location.href=\'p/' + r.item.id + '.html\'"><i class="fas fa-file-alt"></i><div class="result-item-content"><h5>' + r.item.title + tags + '</h5><p>' + (r.item.content.length > 80 ? r.item.content.substring(0, 80) + '...' : r.item.content) + '</p></div></div>';
                });
                html += '</div>';
            }
            
            resultsDiv.innerHTML = html;
        }
        
        // 回车搜索
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') performSearch();
        });
        
        // 时间显示
            const n = new Date(), u = n.getTime() + n.getTimezoneOffset() * 60000, bj = new Date(u + 28800000);
            document.getElementById('beijing-time').textContent = String(bj.getHours()).padStart(2,'0')+':'+String(bj.getMinutes()).padStart(2,'0')+':'+String(bj.getSeconds()).padStart(2,'0');
        }
        
        // 初始化
        loadPosts();
    </script>
</body>
</html>
