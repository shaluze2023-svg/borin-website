<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <script>
    (function() {
        var theme = "dark";
        var c = document.cookie.split("; ");
        for (var i = 0; i < c.length; i++) {
            if (c[i].indexOf("theme=") === 0) {
                theme = decodeURIComponent(c[i].substring(6));
                break;
            }
        }
        if (c.every(function(x) { return x.indexOf("theme=") !== 0; })) {
            var now = new Date();
            var utc = now.getTime() + (now.getTimezoneOffset() * 60000);
            var bj = new Date(utc + 28800000);
            var hour = bj.getHours();
            theme = (hour >= 6 && hour < 18) ? "light" : "dark";
        }
        document.documentElement.setAttribute("data-theme", theme);
    })();
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>帖子详情 - ぼりんの网站</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="../protect.js"></script>
    <style>
        :root { --bg-card: rgba(255, 255, 255, 0.85); --text-primary: #3d2c29; --text-secondary: #8b7068; --accent: #fb7299; --border: rgba(251, 114, 153, 0.15); --shadow: rgba(251, 114, 153, 0.08); --gradient-1: #fff0eb; --gradient-2: #ffe4dc; --gradient-3: #ffd6cc; --gradient-4: #ffeee8; --header-bg: rgba(255, 255, 255, 0.92); --footer-bg: rgba(255, 248, 245, 0.92); --time-bg: rgba(255, 230, 220, 0.7); --input-bg: rgba(230, 230, 240, 0.6); }
        [data-theme="dark"] { --bg-card: rgba(20, 25, 50, 0.6); --text-primary: #f0f0f0; --text-secondary: #a0a0c0; --gradient-1: #1a1a2e; --gradient-2: #16213e; --gradient-3: #0f3460; --gradient-4: #1a1a2e; --header-bg: rgba(10, 10, 20, 0.7); --footer-bg: rgba(10, 10, 20, 0.85); --time-bg: rgba(30, 40, 70, 0.5); --input-bg: rgba(30, 40, 70, 0.5); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { min-height: 100vh; background: linear-gradient(-45deg, var(--gradient-1), var(--gradient-2), var(--gradient-3), var(--gradient-4)); background-size: 400% 400%; animation: gradientBG 15s ease infinite; color: var(--text-primary); display: flex; flex-direction: column; }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 30px; background: var(--header-bg); backdrop-filter: blur(10px); box-shadow: 0 4px 20px var(--shadow); position: sticky; top: 0; z-index: 100; }
        .menu-btn, .search-btn { background: none; border: none; color: var(--text-primary); font-size: 1.8rem; cursor: pointer; padding: 10px; border-radius: 50%; }
        .title { font-size: 2.2rem; font-weight: 700; letter-spacing: 2px; background: linear-gradient(to right, #ff7e5f, #feb47b, #86a8e7, #91eae4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        main { flex: 1; padding: 40px 20px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 800px; width: 100%; }
        .back-btn { display: inline-flex; align-items: center; background: var(--bg-card); color: var(--text-primary); padding: 10px 20px; border-radius: 30px; text-decoration: none; border: 1px solid var(--border); margin-bottom: 20px; }
        .back-btn i { margin-right: 8px; }
        .post-card { background: var(--bg-card); border-radius: 20px; padding: 30px; border: 1px solid var(--border); margin-bottom: 20px; }
        .post-header { margin-bottom: 25px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
        .post-title { font-size: 2rem; margin-bottom: 15px; }
        .post-meta { display: flex; flex-wrap: wrap; gap: 15px; color: var(--text-secondary); font-size: 0.9rem; }
        .post-tags { display: flex; gap: 8px; }
        .post-tag { color: #fb7299; }
        .post-body { line-height: 1.8; font-size: 1.1rem; white-space: pre-wrap; }
        .post-images { display: flex; flex-wrap: wrap; gap: 15px; margin-top: 25px; }
        .post-images img { max-width: 100%; border-radius: 15px; cursor: pointer; }
        .comments-section { background: var(--bg-card); border-radius: 20px; padding: 30px; border: 1px solid var(--border); }
        .comments-title { font-size: 1.5rem; color: #feb47b; margin-bottom: 20px; }
        .comment-form { margin-bottom: 25px; padding-bottom: 25px; border-bottom: 1px solid var(--border); }
        .form-input { width: 100%; padding: 12px 15px; background: var(--input-bg); border: 2px solid var(--border); border-radius: 10px; color: var(--text-primary); font-size: 1rem; margin-bottom: 15px; }
        .form-input:focus { outline: none; border-color: #fb7299; }
        .form-textarea { min-height: 100px; resize: vertical; }
        .submit-btn { padding: 12px 30px; background: linear-gradient(135deg, #fb7299, #ff7e5f); color: white; border: none; border-radius: 10px; font-size: 1rem; cursor: pointer; }
        .comments-list { display: flex; flex-direction: column; gap: 15px; }
        .comment-item { background: var(--input-bg); border-radius: 15px; padding: 20px; }
        .comment-header { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .comment-author { font-weight: 600; color: #86a8e7; }
        .comment-date { font-size: 0.85rem; color: var(--text-secondary); }
        .comment-content { line-height: 1.6; }
        .no-comments { text-align: center; color: var(--text-secondary); padding: 30px; }
        .not-found { text-align: center; padding: 50px; }
        .not-found i { font-size: 4rem; color: var(--text-secondary); margin-bottom: 20px; }
        .loading { text-align: center; padding: 50px; color: var(--text-secondary); }
        .loading i { font-size: 2rem; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--accent); color: white; padding: 15px 30px; border-radius: 10px; z-index: 4000; transition: transform 0.3s; }
        .toast.show { transform: translateX(-50%) translateY(0); }
        footer { display: flex; flex-direction: column; align-items: center; padding: 25px; background: var(--footer-bg); border-top: 1px solid var(--border); }
        .time-label { color: #86a8e7; margin-right: 10px; }
        .time-value { color: #feb47b; }
        .copyright { margin-top: 20px; color: var(--text-secondary); }
        .time-icon { margin-right: 15px; color: #ff7e5f; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
    </style>
</head>
<body>
    <header>
        <button class="menu-btn" onclick="location.href='../post.html'"><i class="fas fa-arrow-left"></i></button>
        <h1 class="title">帖子详情</h1>
        <button class="search-btn" onclick="location.href='../search.html'"><i class="fas fa-search"></i></button>
    </header>
    
    <main>
        <div class="container">
            <a href="../post.html" class="back-btn"><i class="fas fa-arrow-left"></i> 返回帖子列表</a>
            <div class="loading" id="loading"><i class="fas fa-spinner"></i><p>加载中...</p></div>
            <div class="post-card" id="postCard" style="display:none"></div>
            <div class="comments-section" id="commentsSection" style="display:none">
                <h3 class="comments-title"><i class="fas fa-comments"></i> 评论区</h3>
                <div class="comment-form">
                    <input type="text" class="form-input" id="commentAuthor" placeholder="你的昵称" maxlength="20">
                    <textarea class="form-input form-textarea" id="commentContent" placeholder="写下你的评论..."></textarea>
                    <button class="submit-btn" onclick="submitComment()"><i class="fas fa-paper-plane"></i> 发表评论</button>
                </div>
                <div class="comments-list" id="commentsList"></div>
            </div>
        </div>
    </main>
    
    <div class="toast" id="toast"></div>
    
    <footer>
        <div class="copyright">© 2026 ぼりんの网站 | 帖子详情</div>
    </footer>
    
    <script>
        const _c = {b:"69abb4bbd0ea881f40f802db",k:""};
        const API_URL = "https://api.jsonbin.io/v3/b/" + _c.b;
        
        // 从URL获取帖子ID: /p/?id=123 或 /p/index.html?id=123
        const urlParams = new URLSearchParams(window.location.search);
        const postId = parseInt(urlParams.get('id') || '1');
        
        let currentPost = null, allPosts = [];
        
        function getBeijingHour() { const n = new Date(), u = n.getTime() + n.getTimezoneOffset() * 60000; return new Date(u + 28800000).getHours(); }
        function initTheme() { applyTheme(getCookie('theme') || (getBeijingHour() >= 6 && getBeijingHour() < 18 ? 'light' : 'dark')); }
        function applyTheme(t) { document.documentElement.setAttribute('data-theme', t); }
        function getCookie(n) { const c = document.cookie.split('; ').find(r => r.startsWith(n + '=')); return c ? decodeURIComponent(c.split('=')[1]) : null; }
        function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2000); }
        function getTimeAgo(d) { const diff = Date.now() - new Date(d).getTime(), m = Math.floor(diff/60000), h = Math.floor(diff/3600000), dd = Math.floor(diff/86400000); if(dd>30) return Math.floor(dd/30)+'个月前'; if(dd>0) return dd+'天前'; if(h>0) return h+'小时前'; if(m>0) return m+'分钟前'; return '刚刚'; }
        function formatDate(d) { const n = new Date(d); return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0')+'-'+String(n.getDate()).padStart(2,'0')+' '+String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0'); }
        
        initTheme();
        
        async function loadPost() {
            try {
                const res = await fetch(API_URL + '/latest', { headers: { 'Content-Type': 'application/json' } });
                if (res.ok) { allPosts = (await res.json()).record.posts || []; }
                else { allPosts = JSON.parse(localStorage.getItem('borin_posts') || '[]'); }
            } catch(e) { allPosts = JSON.parse(localStorage.getItem('borin_posts') || '[]'); }
            
            currentPost = allPosts.find(p => p.id === postId);
            document.getElementById('loading').style.display = 'none';
            
            if (!currentPost) {
                document.getElementById('postCard').innerHTML = '<div class="not-found"><i class="fas fa-exclamation-circle"></i><p>帖子不存在</p><a href="../post.html" class="back-btn" style="margin-top:20px"><i class="fas fa-arrow-left"></i> 返回</a></div>';
                document.getElementById('postCard').style.display = 'block';
                return;
            }
            
            document.title = currentPost.title + ' - ぼりんの网站';
            
            let html = '<div class="post-header"><h2 class="post-title">' + currentPost.title + '</h2><div class="post-meta"><div class="post-tags">' + currentPost.tags.map(t => '<span class="post-tag">#' + t + '</span>').join(' ') + '</div><div><i class="fas fa-calendar"></i> ' + formatDate(currentPost.date) + ' (' + getTimeAgo(currentPost.date) + ')</div></div></div><div class="post-body">' + currentPost.content + '</div>';
            if (currentPost.images && currentPost.images.length) { html += '<div class="post-images">' + currentPost.images.map(img => '<img src="' + img + '" onclick="window.open(this.src)">').join('') + '</div>'; }
            
            document.getElementById('postCard').innerHTML = html;
            document.getElementById('postCard').style.display = 'block';
            document.getElementById('commentsSection').style.display = 'block';
            renderComments();
        }
        
        function renderComments() {
            const list = document.getElementById('commentsList'), comments = currentPost.comments || [];
            if (!comments.length) { list.innerHTML = '<div class="no-comments"><i class="fas fa-comment-slash"></i><p>暂无评论</p></div>'; return; }
            list.innerHTML = comments.map(c => '<div class="comment-item"><div class="comment-header"><span class="comment-author">' + c.author + '</span><span class="comment-date">' + formatDate(c.date) + '</span></div><div class="comment-content">' + c.content + '</div></div>').join('');
        }
        
        async function submitComment() {
            const author = document.getElementById('commentAuthor').value.trim(), content = document.getElementById('commentContent').value.trim();
            if (!author) return showToast('请输入昵称');
            if (!content) return showToast('请输入评论内容');
            if (!currentPost.comments) currentPost.comments = [];
            currentPost.comments.push({ author, content, date: new Date().toISOString() });
            const idx = allPosts.findIndex(p => p.id === postId);
            if (idx !== -1) {
                allPosts[idx] = currentPost;
                localStorage.setItem('borin_posts', JSON.stringify(allPosts));
                try { await fetch(API_URL, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({posts: allPosts}) }); } catch(e) {}
            }
            document.getElementById('commentAuthor').value = '';
            document.getElementById('commentContent').value = '';
            renderComments();
            showToast('评论成功！');
        }
        
        loadPost();
    </script>
</body>
</html>
