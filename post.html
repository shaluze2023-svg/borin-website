<head>
        <script>
        (function() {
            var theme = "dark";
            var c = document.cookie.split("; ");
            for (var i = 0; i < c.length; i++) {
                if (c[i].indexOf("theme=") === 0) {
                    theme = decodeURIComponent(c[i].substring(6));
                    break;
                }
            }
            if (c.every(function(x) { return x.indexOf("theme=") !== 0; })) {
                var now = new Date();
                var utc = now.getTime() + (now.getTimezoneOffset() * 60000);
                var bj = new Date(utc + 28800000);
                var hour = bj.getHours();
                theme = (hour >= 6 && hour < 18) ? "light" : "dark";
            }
            document.documentElement.setAttribute("data-theme", theme);
        })();
        </script>

    </style>

    <script>
        // ===== 配置 =====
        // API配置分散存储，增加安全性
        const _c = {b:'69a8140243b1c97be9b266ab',k:'H2JFMGgdaWvqVWl0L1eFy.Vo/pkShpTWl3F.t2OEse8bkcC97anhy'};
        const API_URL = 'https://api.jsonbin.io/v3/b/' + _c.b;
        
        // 密码哈希 (lbl716619528688201262)
        const KEY_HASH = 'd0dd45b40272a6e87287a6a8b19414f10f9574fa09fe387b375cb365bbd681f1';
        
        let posts = [], currentFilter = null, uploadedImages = [], isAuthenticated = false, editingId = null;
        
        // ===== 工具函数 =====
        function getBeijingHour() { const n = new Date(), u = n.getTime() + n.getTimezoneOffset() * 60000; return new Date(u + 28800000).getHours(); }
        function initTheme() { const s = getCookie('theme'); applyTheme(s || (getBeijingHour() >= 6 && getBeijingHour() < 18 ? 'light' : 'dark')); }
        function applyTheme(t) { document.documentElement.setAttribute('data-theme', t); }
        function getCookie(n) { const c = document.cookie.split('; ').find(r => r.startsWith(n + '=')); return c ? decodeURIComponent(c.split('=')[1]) : null; }
        
        function showLoading(show, text = '加载中...') { document.getElementById('loadingText').textContent = text; document.getElementById('loading').style.display = show ? 'flex' : 'none'; }
        function showToast(msg, isError = false) { const t = document.getElementById('toast'); t.textContent = msg; t.className = 'toast show' + (isError ? ' error' : ''); setTimeout(() => t.classList.remove('show'), 2500); }
        
        function getTimeAgo(d) { const diff = Date.now() - new Date(d).getTime(), m = Math.floor(diff/60000), h = Math.floor(diff/3600000), dd = Math.floor(diff/86400000); if(dd>30) return Math.floor(dd/30)+'个月前'; if(dd>0) return dd+'天前'; if(h>0) return h+'小时前'; if(m>0) return m+'分钟前'; return '刚刚'; }
        function formatDate(d) { const n = new Date(d); return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0')+'-'+String(n.getDate()).padStart(2,'0')+' '+String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0'); }
        function extractTags(t) { return (t.match(/#[\u4e00-\u9fa5a-zA-Z0-9_]+/g) || []).map(x => x.substring(1)); }
        async function sha256(m) { const b = new TextEncoder().encode(m), h = await crypto.subtle.digest('SHA-256', b); return Array.from(new Uint8Array(h)).map(x => x.toString(16).padStart(2,'0')).join(''); }
        
        function getHeaders() { return { 'Content-Type': 'application/json', 'X-Master-Key': '$2a$10$' + _c.k }; }
        
        initTheme();
        
        // ===== 数据操作 =====
        async function loadPosts() {
            showLoading(true, '加载帖子...');
            try {
                const res = await fetch(API_URL + '/latest', { headers: getHeaders() });
                if (res.ok) { const d = await res.json(); posts = d.record.posts || []; }
                else { posts = JSON.parse(localStorage.getItem('borin_posts') || '[]'); }
            } catch(e) { posts = JSON.parse(localStorage.getItem('borin_posts') || '[]'); }
            showLoading(false);
            renderTags();
            renderPosts();
        }
        
        async function savePosts() {
            localStorage.setItem('borin_posts', JSON.stringify(posts));
            try { await fetch(API_URL, { method: 'PUT', headers: getHeaders(), body: JSON.stringify({posts}) }); }
            catch(e) { console.log('云端同步失败'); }
        }
        
        // ===== UI =====
        function openSidebar() { document.getElementById('sidebar').classList.add('open'); document.getElementById('overlay').classList.add('active'); }
        function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('overlay').classList.remove('active'); }
        function navigate(p) { closeSidebar(); setTimeout(() => location.href = p, 200); }
        
        async function verifyKey() {
            const input = document.getElementById('authKey').value;
            if (!input) return showToast('请输入密码', true);
            if (await sha256(input) === KEY_HASH) {
                isAuthenticated = true;
                document.getElementById('authSection').style.display = 'none';
                document.getElementById('postForm').style.display = 'block';
            } else { showToast('密码错误', true); }
        }
        
        function openEditor(id = null) {
            editingId = id;
            document.getElementById('editorModal').classList.add('show');
            document.getElementById('editorTitle').textContent = id ? '编辑帖子' : '发布新帖子';
            document.getElementById('submitBtn').textContent = id ? '保存修改' : '发布帖子';
            
            if (id) {
                const post = posts.find(p => p.id === id);
                if (post) {
                    document.getElementById('postTitle').value = post.title;
                    document.getElementById('postTags').value = post.tags.map(t => '#' + t).join(' ');
                    document.getElementById('postContent').value = post.content;
                    document.getElementById('editPostId').value = id;
                    uploadedImages = post.images || [];
                    renderImagePreview();
                }
                document.getElementById('authSection').style.display = 'none';
                document.getElementById('postForm').style.display = 'block';
            } else {
                document.getElementById('editPostId').value = '';
                if (isAuthenticated) {
                    document.getElementById('authSection').style.display = 'none';
                    document.getElementById('postForm').style.display = 'block';
                } else {
                    document.getElementById('authSection').style.display = 'block';
                    document.getElementById('postForm').style.display = 'none';
                }
            }
        }
        
        function closeEditor() {
            document.getElementById('editorModal').classList.remove('show');
            document.getElementById('authKey').value = '';
            document.getElementById('postTitle').value = '';
            document.getElementById('postTags').value = '';
            document.getElementById('postContent').value = '';
            document.getElementById('imagePreview').innerHTML = '';
            uploadedImages = [];
            editingId = null;
        }
        
        function handleImages(e) {
            const files = e.target.files;
            for (let file of files) {
                if (uploadedImages.length >= 5) { showToast('最多5张图片', true); break; }
                const reader = new FileReader();
                reader.onload = ev => { uploadedImages.push(ev.target.result); renderImagePreview(); };
                reader.readAsDataURL(file);
            }
        }
        
        function renderImagePreview() {
            document.getElementById('imagePreview').innerHTML = uploadedImages.map((img, i) => 
                '<div style="position:relative;display:inline-block"><img src="' + img + '"><button type="button" onclick="removeImage(' + i + ')" style="position:absolute;top:-5px;right:-5px;background:#e74c3c;color:white;border:none;border-radius:50%;width:20px;height:20px;cursor:pointer">×</button></div>'
            ).join('');
        }
        
        function removeImage(i) { uploadedImages.splice(i, 1); renderImagePreview(); }
        
        function renderTags() {
            const tc = {};
            posts.forEach(p => p.tags.forEach(t => tc[t] = (tc[t] || 0) + 1));
            const list = document.getElementById('tagsList');
            if (!Object.keys(tc).length) { list.innerHTML = '<span style="color:var(--text-secondary)">暂无标签</span>'; return; }
            let html = '<div class="tag-item' + (currentFilter === null ? ' active' : '') + '" onclick="filterByTag(null)">全部 <span class="tag-count">' + posts.length + '</span></div>';
            for (let t in tc) html += '<div class="tag-item' + (currentFilter === t ? ' active' : '') + '" onclick="filterByTag(\'' + t + '\')">#' + t + ' <span class="tag-count">' + tc[t] + '</span></div>';
            list.innerHTML = html;
        }
        
        function filterByTag(t) { currentFilter = t; renderTags(); renderPosts(); }
        
        function renderPosts() {
            const list = document.getElementById('postsList');
            let filtered = currentFilter ? posts.filter(p => p.tags.includes(currentFilter)) : posts;
            if (!filtered.length) { list.innerHTML = '<div class="no-posts"><i class="fas fa-inbox"></i><p>暂无帖子</p><p style="font-size:1rem;margin-top:10px">点击右下角按钮发布吧！</p></div>'; return; }
            filtered.sort((a, b) => new Date(b.date) - new Date(a.date));
            list.innerHTML = filtered.map(p => 
                '<div class="post-card" onclick="openPost(' + p.id + ')" style="cursor:pointer"><div class="post-actions"><button class="action-btn" onclick="event.stopPropagation();openEditor(' + p.id + ')" title="编辑"><i class="fas fa-edit"></i></button><button class="action-btn delete" onclick="event.stopPropagation();deletePost(' + p.id + ')" title="删除"><i class="fas fa-trash"></i></button></div><h3 class="post-title">' + p.title + '</h3><p class="post-excerpt">' + (p.content.length > 150 ? p.content.substring(0, 150) + '...' : p.content) + '</p><div class="post-meta"><div class="post-tags">' + p.tags.map(t => '<span class="post-tag">#' + t + '</span>').join(' ') + '</div><div style="display:flex;align-items:center;gap:5px"><i class="fas fa-calendar"></i> ' + formatDate(p.date) + ' <span style="color:#86a8e7">(' + getTimeAgo(p.date) + ')</span></div></div></div>'
            ).join('');
        }
        
        function openPost(id) { location.href = 'p/?id=' + id; }
        
        async function deletePost(id) {
            if (!isAuthenticated) { showToast('请先验证密码', true); return; }
            if (!confirm('确定要删除这篇帖子吗？')) return;
            posts = posts.filter(p => p.id !== id);
            await savePosts();
            renderTags();
            renderPosts();
            showToast('删除成功');
        }
        
        async function submitPost(e) {
            e.preventDefault();
            if (!isAuthenticated) return showToast('请先验证密码', true);
            const title = document.getElementById('postTitle').value.trim();
            const content = document.getElementById('postContent').value.trim();
            if (!title || !content) return showToast('请填写标题和内容', true);
            
            showLoading(true, editingId ? '保存中...' : '发布中...');
            
            const editId = document.getElementById('editPostId').value;
            if (editId) {
                const idx = posts.findIndex(p => p.id === parseInt(editId));
                if (idx !== -1) {
                    posts[idx] = { ...posts[idx], title, content, tags: extractTags(document.getElementById('postTags').value), images: uploadedImages };
                }
            } else {
                posts.push({
                    id: posts.length ? Math.max(...posts.map(p => p.id)) + 1 : 1,
                    title, content,
                    tags: extractTags(document.getElementById('postTags').value),
                    images: uploadedImages.slice(0, 5),
                    date: new Date().toISOString(),
                    comments: []
                });
            }
            
            await savePosts();
            showLoading(false);
            closeEditor();
            renderTags();
            renderPosts();
            showToast(editingId ? '修改成功！' : '发布成功！');
        }
        
            const n = new Date(), u = n.getTime() + n.getTimezoneOffset() * 60000, bj = new Date(u + 28800000);
            document.getElementById('beijing-time').textContent = String(bj.getHours()).padStart(2,'0')+':'+String(bj.getMinutes()).padStart(2,'0')+':'+String(bj.getSeconds()).padStart(2,'0');
        }
        
        loadPosts();
    </script>
</body>
</html>
